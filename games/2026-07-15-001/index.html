<!--GAMEMETA {"title":"喵色逃脫道","emoji":"🐱","genre":"益智","inspiration":"Color Block Jam（Rollic Games）","desc":"拖曳史萊姆貓滑出同色貓門，看穿先後順序純解謎"}-->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>喵色逃脫道</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#141b17;overflow:hidden;
    font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    -webkit-user-select:none;user-select:none;touch-action:none;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:
    radial-gradient(120% 90% at 50% 0%,#20302a 0%,#141b17 60%,#0d120f 100%);}
  canvas{display:block;touch-action:none;border-radius:14px;box-shadow:0 10px 40px rgba(0,0,0,.5);}
  #lobby{position:fixed;top:8px;left:10px;z-index:10;color:#bfe8c6;text-decoration:none;
    font-size:13px;background:rgba(20,30,25,.6);padding:5px 10px;border-radius:20px;
    border:1px solid rgba(120,200,140,.3);}
  #lobby:active{background:rgba(40,60,50,.8);}
</style>
</head>
<body>
<a id="lobby" href="../../index.html">← 回遊戲區</a>
<div id="wrap"><canvas id="c"></canvas></div>
<script>
"use strict";
(function(){
/* ===== 邏輯畫布固定 400x600，高解析輸出 ===== */
const LW=400, LH=600;
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
let Sx=1, DPR=1;
function resize(){
  const s=Math.min(window.innerWidth/LW, window.innerHeight/LH);
  const cssW=Math.round(LW*s), cssH=Math.round(LH*s);
  DPR=Math.min(3, window.devicePixelRatio||1);
  cv.style.width=cssW+'px'; cv.style.height=cssH+'px';
  cv.width=Math.round(cssW*DPR); cv.height=Math.round(cssH*DPR);
  Sx=cssW/LW; // 邏輯 -> 顯示
  ctx.setTransform(Sx*DPR,0,0,Sx*DPR,0,0); // 之後全用 400x600 邏輯座標
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',resize);
resize();

/* ===== 常數與版面 ===== */
const R=6, C=6, CELL=50;
const BX=50, BY=156;            // 盤面左上（邏輯座標）
const START_TIME=50, TIME_CAP=90, EXIT_TIME=1.6;
const BASE_EXIT=12, COMBO_WINDOW=4;
const btnUndo={x:14,y:498,w:150,h:46};
const btnShuffle={x:176,y:498,w:126,h:46};
const btnSound={x:312,y:498,w:74,h:46};

// 各色史萊姆貓（自訂配色，非原作）
const COLORS=[
  {name:'綠',main:'#5bd66b',dark:'#2f9a3e'},
  {name:'藍',main:'#57b8ff',dark:'#2578cf'},
  {name:'橘',main:'#ff9d3c',dark:'#dc6d12'},
  {name:'粉',main:'#ff82b2',dark:'#dd4f86'},
  {name:'紫',main:'#b183ff',dark:'#7c47d4'},
  {name:'黃',main:'#ffd24d',dark:'#dca31c'},
];

/* ===== 遊戲狀態 ===== */
let state='title';      // title / playing / levelclear / over
let level=1, score=0, best=0, maxLevel=0;
let timeLeft=START_TIME, gameTime=0;
let combo=0, lastExit=-99;
let blocks=[], grid=makeGrid(), gates=[];
let particles=[], flyouts=[], popups=[];
let history=[], dragging=null, shake=0;
let toastT=0, toastBonus=0, newRecord=false, overDiff=0;
let soundOn=true, warnSec=99;

function makeGrid(){ return Array.from({length:R},()=>Array(C).fill(null)); }
function rebuildGrid(){ grid=makeGrid(); for(const b of blocks) grid[b.r][b.c]=b; }
function cx(c){return BX+c*CELL+CELL/2;}
function cy(r){return BY+r*CELL+CELL/2;}
function mkBlock(r,c,color){ return {r,c,color,vx:cx(c),vy:cy(r),scale:0.2}; }
function ri(n){return Math.floor(Math.random()*n);}

/* ===== localStorage ===== */
function save(k,v){ try{localStorage.setItem('meowesc_'+k,String(v));}catch(e){} }
function load(k,d){ try{const v=localStorage.getItem('meowesc_'+k); return v==null?d:v;}catch(e){return d;} }
best=parseInt(load('best','0'))||0;
maxLevel=parseInt(load('lvl','0'))||0;

/* ===== 音效（WebAudio 合成） ===== */
let ac=null;
function AC(){ if(!ac){ try{ac=new (window.AudioContext||window.webkitAudioContext)();}catch(e){ac=null;} } if(ac&&ac.state==='suspended'){ ac.resume().catch(()=>{}); } return ac; }
function tone(f,dur,type,vol,to){ if(!soundOn)return; const a=AC(); if(!a)return;
  const o=a.createOscillator(),g=a.createGain(); o.type=type||'sine'; o.frequency.value=f;
  if(to) o.frequency.exponentialRampToValueAtTime(Math.max(20,to),a.currentTime+dur);
  g.gain.value=0.0001; g.gain.linearRampToValueAtTime(vol||0.2,a.currentTime+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+dur);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+dur+0.03);
}
function noise(dur,vol){ if(!soundOn)return; const a=AC(); if(!a)return;
  const n=Math.floor(a.sampleRate*dur), buf=a.createBuffer(1,n,a.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const s=a.createBufferSource(); s.buffer=buf; const fl=a.createBiquadFilter(); fl.type='highpass'; fl.frequency.value=700;
  const g=a.createGain(); g.gain.value=vol||0.12; s.connect(fl); fl.connect(g); g.connect(a.destination); s.start();
}
function arp(list,step,type,vol){ list.forEach((f,i)=>setTimeout(()=>tone(f,0.16,type||'triangle',vol||0.18),i*step)); }
const sfxPick =()=>tone(560,0.06,'sine',0.10);
const sfxSlide=()=>{noise(0.08,0.07); tone(320,0.05,'triangle',0.05);};
const sfxThunk=()=>tone(130,0.12,'sawtooth',0.12,80);
const sfxUndo =()=>tone(380,0.09,'sine',0.10,300);
const sfxExit =(m)=>{const b=430*Math.pow(1.05,m); tone(b,0.16,'triangle',0.22,b*1.5); setTimeout(()=>tone(b*1.5,0.12,'sine',0.10),40);};
const sfxLevel=()=>arp([523,659,784,1046],90);
const sfxRecord=()=>arp([784,988,1175,1568,1976],80,'triangle',0.2);
const sfxOver =()=>arp([420,330,262,196],120,'sine',0.16);
let tickToggle=0; const sfxTick=()=>{tickToggle^=1; tone(tickToggle?900:760,0.06,'square',0.08);};

/* ===== 貓門與盤面 ===== */
function laneCells(g){ const a=[];
  if(g.side==='L'){ for(let c=0;c<C;c++)a.push({r:g.idx,c}); }
  else if(g.side==='R'){ for(let c=C-1;c>=0;c--)a.push({r:g.idx,c}); }
  else if(g.side==='T'){ for(let r=0;r<R;r++)a.push({r,c:g.idx}); }
  else { for(let r=R-1;r>=0;r--)a.push({r,c:g.idx}); }
  return a;
}
function gateAt(side,idx){ for(const g of gates) if(g.side===side&&g.idx===idx) return g.color; return -1; }

// 反向生成：每塊都由對應色貓門滑入，倒序即為保證可解的解答
function genLevel(L){
  grid=makeGrid(); blocks=[]; gates=[]; flyouts=[]; particles=[]; popups=[]; history=[];
  const K=Math.min(6, 2+Math.floor((L-1)/2));   // 顏色數
  const sides=['L','R','T','B'];
  const used=new Set();
  for(let col=0; col<K; col++){                 // 每色至少一個門
    for(let t=0;t<40;t++){ const side=sides[ri(4)], idx=ri(6), key=side+idx;
      if(used.has(key)) continue; used.add(key); gates.push({side,idx,color:col}); break; }
  }
  const extra=L>=4?Math.min(2,Math.floor(L/4)):0; // 高關多幾個門給選擇
  for(let e=0;e<extra;e++){ for(let t=0;t<30;t++){ const side=sides[ri(4)], idx=ri(6), key=side+idx;
      if(used.has(key)) continue; used.add(key); gates.push({side,idx,color:ri(K)}); break; } }
  const N=Math.min(26, 4+Math.round(L*1.8));      // 密度
  const deepBias=Math.min(0.82, 0.18+L*0.08);
  let att=0;
  while(blocks.length<N && att<N*10){
    att++;
    const g=gates[ri(gates.length)];
    const lane=laneCells(g);
    const prefix=[];
    for(const cl of lane){ if(grid[cl.r][cl.c]==null) prefix.push(cl); else break; }
    if(!prefix.length) continue;
    const idx=(Math.random()<deepBias)?prefix.length-1:ri(prefix.length);
    const cl=prefix[idx];
    const b=mkBlock(cl.r,cl.c,g.color);
    blocks.push(b); grid[cl.r][cl.c]=b;
  }
}

/* ===== 移動邏輯（滑到底或滑出） ===== */
function furthest(b,axis,dir){
  if(axis==='h'){
    const r=b.r; let nc=b.c;
    while(true){ const t=nc+dir; if(t<0||t>=C)break; if(grid[r][t])break; nc=t; }
    const atB=(dir<0&&nc===0)||(dir>0&&nc===C-1);
    const side=dir<0?'L':'R';
    return {axis:'h',n:nc,cells:Math.abs(nc-b.c),exit:atB&&gateAt(side,r)===b.color,side};
  }else{
    const c=b.c; let nr=b.r;
    while(true){ const t=nr+dir; if(t<0||t>=R)break; if(grid[t][c])break; nr=t; }
    const atB=(dir<0&&nr===0)||(dir>0&&nr===R-1);
    const side=dir<0?'T':'B';
    return {axis:'v',n:nr,cells:Math.abs(nr-b.r),exit:atB&&gateAt(side,c)===b.color,side};
  }
}
function pushHistory(){
  history.push({blocks:blocks.map(b=>({r:b.r,c:b.c,color:b.color})),score,combo,lastExit});
  if(history.length>50) history.shift();
}
function tryMove(b,axis,dir){
  const f=furthest(b,axis,dir);
  if(f.exit){ pushHistory(); grid[b.r][b.c]=null; if(axis==='h')b.c=f.n; else b.r=f.n; doExit(b,f.side); return 'exit'; }
  if(f.cells>0){ pushHistory(); grid[b.r][b.c]=null; if(axis==='h')b.c=f.n; else b.r=f.n; grid[b.r][b.c]=b; sfxSlide(); return 'move'; }
  return 'none';
}
function tapBlock(b){ // 輕點：若某方向可直接送出就送出
  const dirs=[['h',-1],['h',1],['v',-1],['v',1]];
  for(const [ax,d] of dirs){ if(furthest(b,ax,d).exit){ tryMove(b,ax,d); return; } }
  sfxThunk();
}
function doExit(b,side){
  const px=cx(b.c), py=cy(b.r);
  let gx=px,gy=py,dx=0,dy=0;
  if(side==='L'){gx=BX-12;dx=-1;} else if(side==='R'){gx=BX+C*CELL+12;dx=1;}
  else if(side==='T'){gy=BY-12;dy=-1;} else {gy=BY+R*CELL+12;dy=1;}
  const i=blocks.indexOf(b); if(i>=0) blocks.splice(i,1);
  if(gameTime-lastExit<=COMBO_WINDOW) combo++; else combo=1;
  lastExit=gameTime;
  const mult=Math.min(9,combo);
  const gain=Math.round(BASE_EXIT*mult*(1+level*0.04));
  score+=gain;
  timeLeft=Math.min(TIME_CAP, timeLeft+Math.max(0.6,EXIT_TIME-level*0.05));
  const col=COLORS[b.color];
  burst(gx,gy,col,14);
  popups.push({x:px,y:py-8,vy:-38,text:'+'+gain+(mult>1?' x'+mult:''),color:col.main,life:0.9,max:0.9});
  flyouts.push({x:px,y:py,vx:dx*300,vy:dy*300,color:b.color,life:0.5,rot:0});
  sfxExit(mult); shake=Math.min(9,shake+3.2);
  if(blocks.length===0) onLevelClear();
}
function onLevelClear(){
  state='levelclear'; toastT=1.25;
  toastBonus=30+level*12; score+=toastBonus;
  timeLeft=Math.min(TIME_CAP, timeLeft+Math.max(6,14-level*0.3));
  sfxLevel(); shake=Math.min(12,shake+6);
  for(let i=0;i<40;i++) burst(200,300,COLORS[ri(COLORS.length)],1);
}
function doUndo(){ if(!history.length){sfxThunk();return;} const s=history.pop();
  blocks=s.blocks.map(o=>mkBlock(o.r,o.c,o.color)); rebuildGrid();
  score=s.score; combo=s.combo; lastExit=s.lastExit; sfxUndo(); }
function doShuffle(){ genLevel(level); sfxSlide(); }

function startGame(){ level=1; score=0; combo=0; lastExit=-99; timeLeft=START_TIME; gameTime=0;
  warnSec=99; genLevel(1); state='playing'; }
function gameOver(){ if(state==='over')return; state='over';
  const beat=score>best; if(beat){ best=score; save('best',best); }
  newRecord=beat; overDiff=beat?0:(best-score+1);
  if(level>maxLevel){ maxLevel=level; save('lvl',maxLevel); }
  if(beat) sfxRecord(); else sfxOver();
  if(window.SC && typeof SC.over==='function'){ try{SC.over(score);}catch(e){} }
}

/* ===== 粒子 ===== */
function burst(x,y,col,n){ for(let i=0;i<n;i++){ const a=Math.random()*6.28,sp=40+Math.random()*160;
  particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-30,life:0.5+Math.random()*0.4,max:0.9,
    r:2+Math.random()*3,color:col.main}); } }

/* ===== 輸入 ===== */
function toLogical(e){ const rect=cv.getBoundingClientRect();
  return { x:(e.clientX-rect.left)/rect.width*LW, y:(e.clientY-rect.top)/rect.height*LH }; }
function inRect(p,r){ return p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h; }
function blockAt(p){ if(p.x<BX||p.x>BX+C*CELL||p.y<BY||p.y>BY+R*CELL) return null;
  const c=Math.floor((p.x-BX)/CELL), r=Math.floor((p.y-BY)/CELL);
  if(r<0||r>=R||c<0||c>=C) return null; return grid[r][c]; }

function onDown(p){
  AC();
  if(state==='title'||state==='over'){ startGame(); return; }
  if(state==='levelclear') return;
  if(inRect(p,btnUndo)){ doUndo(); return; }
  if(inRect(p,btnShuffle)){ doShuffle(); return; }
  if(inRect(p,btnSound)){ soundOn=!soundOn; if(soundOn) sfxPick(); return; }
  const b=blockAt(p);
  if(b){ dragging={block:b,sx:p.x,sy:p.y,axis:null,off:0,f:null,dir:1}; sfxPick(); }
}
function onMove(p){
  if(!dragging||state!=='playing') return;
  const dx=p.x-dragging.sx, dy=p.y-dragging.sy;
  if(!dragging.axis){ if(Math.hypot(dx,dy)>6) dragging.axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; }
  if(dragging.axis){
    const along=dragging.axis==='h'?dx:dy;
    const dir=along<0?-1:1;
    const f=furthest(dragging.block,dragging.axis,dir);
    dragging.f=f; dragging.dir=dir;
    const limit=f.cells*CELL+(f.exit?CELL*0.85:0);
    dragging.off=dir*Math.min(Math.abs(along),limit);
  }
}
function onUp(p){
  if(!dragging){ return; }
  const dg=dragging; dragging=null;
  if(state!=='playing') return;
  if(dg.axis){
    const along=dg.axis==='h'?(p.x-dg.sx):(p.y-dg.sy);
    if(Math.abs(along)>=12){ const dir=along<0?-1:1; if(tryMove(dg.block,dg.axis,dir)==='none') sfxThunk(); }
    else tapBlock(dg.block);
  } else tapBlock(dg.block);
}
cv.addEventListener('pointerdown',e=>{ e.preventDefault(); onDown(toLogical(e)); },{passive:false});
cv.addEventListener('pointermove',e=>{ e.preventDefault(); onMove(toLogical(e)); },{passive:false});
window.addEventListener('pointerup',e=>{ onUp(toLogical(e)); });
cv.addEventListener('pointercancel',()=>{ dragging=null; });
window.addEventListener('blur',()=>{ dragging=null; });
cv.addEventListener('contextmenu',e=>e.preventDefault());

/* ===== 更新 ===== */
function update(dt){
  gameTime+=dt;
  for(const b of blocks){
    const tx=cx(b.c), ty=cy(b.r), k=Math.min(1,dt*20);
    if(dragging&&dragging.block===b&&dragging.axis){ b.vx=tx; b.vy=ty; }
    else { b.vx+=(tx-b.vx)*k; b.vy+=(ty-b.vy)*k; }
    b.scale+=(1-b.scale)*Math.min(1,dt*14);
  }
  for(let i=particles.length-1;i>=0;i--){ const q=particles[i]; q.life-=dt; if(q.life<=0){particles.splice(i,1);continue;}
    q.x+=q.vx*dt; q.y+=q.vy*dt; q.vy+=260*dt; }
  for(let i=flyouts.length-1;i>=0;i--){ const f=flyouts[i]; f.life-=dt; if(f.life<=0){flyouts.splice(i,1);continue;}
    f.x+=f.vx*dt; f.y+=f.vy*dt; f.rot+=dt*10; }
  for(let i=popups.length-1;i>=0;i--){ const u=popups[i]; u.life-=dt; if(u.life<=0){popups.splice(i,1);continue;}
    u.y+=u.vy*dt; u.vy*=0.94; }
  if(shake>0) shake=Math.max(0,shake-dt*24);

  if(state==='playing'){
    timeLeft-=dt;
    if(timeLeft<=5){ const s=Math.ceil(timeLeft); if(s!==warnSec&&s>0){ warnSec=s; sfxTick(); } }
    else warnSec=99;
    if(timeLeft<=0){ timeLeft=0; gameOver(); }
  }
  if(state==='levelclear'){ toastT-=dt; if(toastT<=0){ level++; genLevel(level); state='playing'; } }
}

/* ===== 繪圖 ===== */
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function drawCat(x,y,s,ci,sc){
  const col=COLORS[ci], w=s*sc, h=s*sc;
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle=col.dark;
  ctx.beginPath(); ctx.moveTo(-w*0.30,-h*0.18); ctx.lineTo(-w*0.13,-h*0.55); ctx.lineTo(0,-h*0.22); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo( w*0.30,-h*0.18); ctx.lineTo( w*0.13,-h*0.55); ctx.lineTo(0,-h*0.22); ctx.closePath(); ctx.fill();
  rr(-w/2,-h/2,w,h,w*0.28); ctx.fillStyle=col.main; ctx.fill();
  ctx.lineWidth=Math.max(2,w*0.06); ctx.strokeStyle=col.dark; ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.28)'; rr(-w*0.30,-h*0.34,w*0.5,h*0.26,w*0.13); ctx.fill();
  ctx.fillStyle='#20342a';
  ctx.beginPath(); ctx.arc(-w*0.17,h*0.02,w*0.075,0,7); ctx.arc(w*0.17,h*0.02,w*0.075,0,7); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-w*0.15,-h*0.01,w*0.026,0,7); ctx.arc(w*0.19,-h*0.01,w*0.026,0,7); ctx.fill();
  ctx.strokeStyle='#20342a'; ctx.lineWidth=w*0.035; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(-w*0.05,h*0.16,w*0.055,0.1,Math.PI-0.1); ctx.arc(w*0.05,h*0.16,w*0.055,0.1,Math.PI-0.1); ctx.stroke();
  ctx.fillStyle='rgba(255,120,150,0.32)';
  ctx.beginPath(); ctx.arc(-w*0.27,h*0.15,w*0.055,0,7); ctx.arc(w*0.27,h*0.15,w*0.055,0,7); ctx.fill();
  ctx.restore();
}
function drawGate(g){
  const col=COLORS[g.color]; let gx,gy,gw,gh;
  if(g.side==='L'){ gw=16; gh=CELL*0.66; gx=BX-gw; gy=cy(g.idx)-gh/2; }
  else if(g.side==='R'){ gw=16; gh=CELL*0.66; gx=BX+C*CELL; gy=cy(g.idx)-gh/2; }
  else if(g.side==='T'){ gw=CELL*0.66; gh=16; gx=cx(g.idx)-gw/2; gy=BY-gh; }
  else { gw=CELL*0.66; gh=16; gx=cx(g.idx)-gw/2; gy=BY+R*CELL; }
  // 送出中高亮
  const hot=dragging&&dragging.f&&dragging.f.exit&&dragging.f.side===g.side&&
    (g.side==='L'||g.side==='R'?g.idx===dragging.block.r:g.idx===dragging.block.c);
  if(hot){ ctx.save(); ctx.shadowColor=col.main; ctx.shadowBlur=18; }
  ctx.fillStyle=col.dark; rr(gx-1,gy-1,gw+2,gh+2,6); ctx.fill();
  ctx.fillStyle=col.main; rr(gx+2,gy+2,gw-4,gh-4,4); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath(); ctx.arc(gx+gw/2,gy+gh/2,Math.min(gw,gh)*0.32,0,7); ctx.fill();
  if(hot) ctx.restore();
}
function drawButton(b,label,dis){
  ctx.fillStyle=dis?'rgba(70,90,80,0.5)':'rgba(60,110,80,0.85)';
  rr(b.x,b.y,b.w,b.h,12); ctx.fill();
  ctx.strokeStyle='rgba(150,220,170,0.4)'; ctx.lineWidth=1.5; rr(b.x,b.y,b.w,b.h,12); ctx.stroke();
  ctx.fillStyle=dis?'rgba(200,220,210,0.5)':'#eaffee'; ctx.font='bold 18px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(label,b.x+b.w/2,b.y+b.h/2+1);
}
function drawPanel(){ ctx.fillStyle='rgba(10,16,13,0.82)'; rr(30,150,340,320,20); ctx.fill();
  ctx.strokeStyle='rgba(120,200,140,0.35)'; ctx.lineWidth=2; rr(30,150,340,320,20); ctx.stroke(); }

function draw(){
  ctx.clearRect(0,0,LW,LH);
  // 背景
  const bg=ctx.createLinearGradient(0,0,0,LH); bg.addColorStop(0,'#20302a'); bg.addColorStop(1,'#0f1512');
  ctx.fillStyle=bg; ctx.fillRect(0,0,LW,LH);

  // HUD
  ctx.textBaseline='alphabetic';
  ctx.fillStyle='#eaffee'; ctx.font='bold 26px sans-serif'; ctx.textAlign='left';
  ctx.fillText(String(score),16,44);
  ctx.font='13px sans-serif'; ctx.fillStyle='#9fd8ab'; ctx.fillText('分數',18,22);
  ctx.textAlign='right'; ctx.fillStyle='#cfeed6'; ctx.font='14px sans-serif';
  ctx.fillText('最高 '+best,386,24);
  ctx.fillText('第 '+level+' 關',386,44);
  // 時間條
  const barW=372, frac=Math.max(0,Math.min(1,timeLeft/60));
  ctx.fillStyle='rgba(255,255,255,0.12)'; rr(14,60,barW,12,6); ctx.fill();
  const low=timeLeft<=8;
  ctx.fillStyle=low?( (Math.floor(gameTime*6)%2)?'#ff5b5b':'#ff9090' ):'#5bd66b';
  rr(14,60,Math.max(4,barW*frac),12,6); ctx.fill();
  ctx.fillStyle='#0e1512'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
  ctx.fillText(Math.ceil(timeLeft)+'s',200,70);

  // 連擊環
  const wl=COMBO_WINDOW-(gameTime-lastExit);
  if(combo>=2 && wl>0){
    const rx=200,ry=100,rad=13;
    ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(rx,ry,rad,0,7); ctx.stroke();
    ctx.strokeStyle='#ffd24d'; ctx.beginPath();
    ctx.arc(rx,ry,rad,-Math.PI/2,-Math.PI/2+6.283*(wl/COMBO_WINDOW)); ctx.stroke();
    ctx.fillStyle='#ffd24d'; ctx.font='bold 14px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('x'+Math.min(9,combo)+' 連擊',rx,ry+30);
    ctx.textBaseline='alphabetic';
  }

  // 盤面（含震動）
  ctx.save();
  if(shake>0) ctx.translate((Math.random()*2-1)*shake,(Math.random()*2-1)*shake);
  ctx.fillStyle='rgba(255,255,255,0.05)'; rr(BX-4,BY-4,C*CELL+8,R*CELL+8,14); ctx.fill();
  ctx.strokeStyle='rgba(180,230,190,0.18)'; ctx.lineWidth=1;
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){ ctx.strokeRect(BX+c*CELL+0.5,BY+r*CELL+0.5,CELL-1,CELL-1); }
  for(const g of gates) drawGate(g);

  // 拖曳目標提示
  if(dragging&&dragging.axis&&dragging.f){
    const f=dragging.f, b=dragging.block;
    const tr=f.axis==='h'?b.r:f.n, tc=f.axis==='h'?f.n:b.c;
    ctx.strokeStyle=f.exit?'rgba(255,255,255,0.85)':'rgba(255,255,255,0.35)';
    ctx.lineWidth=2; ctx.setLineDash([6,5]);
    rr(BX+tc*CELL+3,BY+tr*CELL+3,CELL-6,CELL-6,10); ctx.stroke(); ctx.setLineDash([]);
  }

  // 貓咪
  const size=CELL*0.82;
  for(const b of blocks){
    let px=b.vx, py=b.vy;
    if(dragging&&dragging.block===b&&dragging.axis){
      if(dragging.axis==='h') px=cx(b.c)+dragging.off; else py=cy(b.r)+dragging.off;
    }
    drawCat(px,py,size,b.color,b.scale);
  }
  for(const f of flyouts){ ctx.save(); ctx.globalAlpha=Math.max(0,f.life/0.5);
    drawCat(f.x,f.y,size*(0.8+f.life),f.color,1); ctx.restore(); }
  for(const q of particles){ ctx.globalAlpha=Math.max(0,q.life/q.max); ctx.fillStyle=q.color;
    ctx.beginPath(); ctx.arc(q.x,q.y,q.r,0,7); ctx.fill(); }
  ctx.globalAlpha=1;
  for(const u of popups){ ctx.globalAlpha=Math.max(0,u.life/u.max); ctx.fillStyle=u.color;
    ctx.font='bold 18px sans-serif'; ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=3; ctx.strokeText(u.text,u.x,u.y); ctx.fillText(u.text,u.x,u.y); }
  ctx.globalAlpha=1;
  ctx.restore();

  // 按鈕
  drawButton(btnUndo,'↩ 復原',history.length===0||state!=='playing');
  drawButton(btnShuffle,'🔀 重排',state!=='playing');
  drawButton(btnSound,soundOn?'🔊':'🔇',false);

  // 覆蓋層
  if(state==='title') drawTitle();
  else if(state==='levelclear') drawToast();
  else if(state==='over') drawOver();
}
function drawTitle(){
  drawPanel();
  ctx.textAlign='center'; ctx.fillStyle='#8ff0a3'; ctx.font='bold 34px sans-serif';
  ctx.fillText('喵色逃脫道',200,208);
  ctx.fillStyle='#e6fff0'; ctx.font='15px sans-serif';
  ctx.fillText('拖史萊姆貓滑向牆上同色貓門送牠回家',200,244);
  ctx.fillStyle='#bfe8c6'; ctx.font='13px sans-serif';
  const lines=['① 拖曳貓咪沿空隙滑動，撞到別的貓就停',
               '② 滑到邊緣「同色貓門」就送牠回家 🎉',
               '③ 路被擋住？先把擋路的貓移開讓路',
               '④ 全部送回家即過關，時間歸零就結束',
               '　 卡住可用「復原 / 重排」，看穿順序就贏！'];
  lines.forEach((t,i)=>ctx.fillText(t,200,278+i*24));
  ctx.fillStyle='#ffd24d'; ctx.font='13px sans-serif';
  ctx.fillText('本機最高 '+best+' 分・最佳第 '+maxLevel+' 關',200,410);
  ctx.fillStyle='#8ff0a3'; ctx.font='bold 19px sans-serif';
  ctx.fillText((Math.floor(gameTime*2)%2?'▶ 點擊開始':'▶ 點擊開始 ▶'),200,446);
}
function drawToast(){
  const a=Math.min(1,toastT/0.3);
  ctx.globalAlpha=Math.min(1,a+0.2);
  ctx.fillStyle='rgba(10,16,13,0.55)'; ctx.fillRect(0,0,LW,LH);
  ctx.fillStyle='#8ff0a3'; ctx.font='bold 30px sans-serif'; ctx.textAlign='center';
  ctx.fillText('第 '+level+' 關 完成！',200,290);
  ctx.fillStyle='#ffd24d'; ctx.font='bold 20px sans-serif';
  ctx.fillText('+'+toastBonus+' 分　時間補充！',200,326);
  ctx.globalAlpha=1;
}
function drawOver(){
  drawPanel();
  ctx.textAlign='center'; ctx.fillStyle='#ff9090'; ctx.font='bold 30px sans-serif';
  ctx.fillText('時間到囉！',200,214);
  ctx.fillStyle='#e6fff0'; ctx.font='16px sans-serif';
  ctx.fillText('本局得分',200,252); ctx.font='bold 40px sans-serif'; ctx.fillStyle='#8ff0a3';
  ctx.fillText(String(score),200,296);
  ctx.font='bold 17px sans-serif';
  if(newRecord){ ctx.fillStyle='#ffd24d'; ctx.fillText('🎉 新紀錄！太神啦',200,336); }
  else { ctx.fillStyle='#ffd24d'; ctx.fillText('再 '+overDiff+' 分就破紀錄！',200,336); }
  ctx.fillStyle='#bfe8c6'; ctx.font='14px sans-serif';
  ctx.fillText('抵達第 '+level+' 關・最高 '+best+' 分',200,370);
  ctx.fillStyle='#8ff0a3'; ctx.font='bold 19px sans-serif';
  ctx.fillText((Math.floor(gameTime*2)%2?'↻ 點擊再來一局':'↻ 點擊再來一局 ↻'),200,428);
}

/* ===== 主迴圈（固定步長累加器，不假設 60fps） ===== */
let last=performance.now(), acc=0; const STEP=1/120;
function frame(now){
  let dt=(now-last)/1000; last=now;
  if(dt>0.25) dt=0.25;      // 切出視窗回來不暴衝
  acc+=dt;
  try{
    while(acc>=STEP){ update(STEP); acc-=STEP; }
    draw();
  }catch(e){ /* 靜默保護，避免中斷迴圈 */ }
  requestAnimationFrame(frame);
}
genLevel(1);                 // 標題背景先鋪一盤
requestAnimationFrame(frame);
})();
</script>
