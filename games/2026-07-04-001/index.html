<!--GAMEMETA {"title":"史萊姆貓彈跳","emoji":"🐱","genre":"街機","inspiration":"創刊號手工特製","desc":"操控史萊姆貓一路往上彈！踩橘色彈簧一飛沖天，掉下去就 GG。"}-->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>史萊姆貓彈跳 — SlimeCat 遊戲區</title>
<style>
  html,body{margin:0;height:100%;background:#0f1a0c;display:flex;align-items:center;justify-content:center;font-family:"Microsoft JhengHei",system-ui,sans-serif;overflow:hidden}
  #wrap{position:relative}
  canvas{display:block;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.55);touch-action:none}
  #back{position:fixed;top:10px;left:12px;color:#9fdc8f;text-decoration:none;font-size:14px;opacity:.85;z-index:9}
</style>
</head>
<body>
<a id="back" href="../../index.html">← 回遊戲區</a>
<div id="wrap"><canvas id="c" width="400" height="600"></canvas></div>
<script>
"use strict";
// ================= 史萊姆貓彈跳 =================
// 玩法：史萊姆貓會自動彈跳，你只要控制左右，
//       一路踩著平台往上爬，掉出畫面下方就結束。

const cv = document.getElementById("c");
const ctx = cv.getContext("2d");
const W = 400, H = 600;

// ---- 遊戲參數（想調難度改這裡）----
const GRAV   = 0.35;   // 重力
const JUMP   = -11.5;  // 一般彈跳力
const SPRING = -19;    // 彈簧彈跳力
const MOVE   = 5;      // 左右移動速度

// ---- 遊戲狀態 ----
let state = "title";   // title=標題 / play=遊玩中 / over=結束
let player, plats, cameraY, minY, score, overAt;
let best = loadBest();

function loadBest() {
  try { return +(localStorage.getItem("slimejump_best") || 0); } catch (e) { return 0; }
}
function saveBest(v) {
  try { localStorage.setItem("slimejump_best", v); } catch (e) { /* 無痕模式可能存不了 */ }
}

// ---- 畫面自適應：把 400x600 等比塞進視窗 ----
function fit() {
  const s = Math.min(innerWidth / W, innerHeight / H) * 0.97;
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  cv.style.width = W * s + "px";
  cv.style.height = H * s + "px";
  cv.width = Math.round(W * s * dpr);   // 實體緩衝跟著螢幕密度，字和圖才不會糊
  cv.height = Math.round(H * s * dpr);
  ctx.setTransform(s * dpr, 0, 0, s * dpr, 0, 0); // 遊戲邏輯座標維持 400×600
}
addEventListener("resize", fit); fit();

// ---- 音效（WebAudio 合成小嗶聲，不用任何音檔）----
let actx = null;
function beep(freq, dur, vol) {
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.frequency.value = freq; o.type = "square";
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + dur);
  } catch (e) { /* 沒聲音也能玩 */ }
}

function rand(a, b) { return a + Math.random() * (b - a); }

// ---- 生一塊新平台（分數越高越難：會動的變多）----
function makePlat(y) {
  const diff = Math.min(1, score / 300);
  const moving = Math.random() < 0.08 + diff * 0.3;
  const spring = !moving && Math.random() < 0.08;
  return { x: rand(0, W - 70), y, w: 70, h: 14,
           type: moving ? "move" : (spring ? "spring" : "normal"),
           dir: Math.random() < 0.5 ? -1 : 1 };
}

// ---- 初始化一局 ----
function reset() {
  score = 0;
  player = { x: W / 2 - 22, y: 500, w: 44, h: 38, vx: 0, vy: JUMP };
  minY = player.y;
  cameraY = 0;
  plats = [{ x: W / 2 - 45, y: 555, w: 90, h: 14, type: "normal", dir: 1 }];
  let y = 555;
  while (y > -200) { y -= rand(52, 85); plats.push(makePlat(y)); }
}

// ---- 輸入：鍵盤 ----
const keys = {};
addEventListener("keydown", e => {
  if (["ArrowLeft", "ArrowRight", " "].includes(e.key)) e.preventDefault();
  keys[e.key] = true;
  pressAnywhere();
});
addEventListener("keyup", e => keys[e.key] = false);

// ---- 輸入：觸控 / 滑鼠（按住畫面左半邊往左、右半邊往右）----
let pointerSide = 0; // -1 左 / 1 右 / 0 沒按
cv.addEventListener("pointerdown", e => {
  const r = cv.getBoundingClientRect();
  pointerSide = (e.clientX - r.left) < r.width / 2 ? -1 : 1;
  pressAnywhere();
});
cv.addEventListener("pointermove", e => {
  if (pointerSide === 0) return;
  const r = cv.getBoundingClientRect();
  pointerSide = (e.clientX - r.left) < r.width / 2 ? -1 : 1;
});
addEventListener("pointerup", () => pointerSide = 0);
addEventListener("pointercancel", () => pointerSide = 0); // 來電/通知打斷觸控，別讓貓自己一直跑
addEventListener("blur", () => { pointerSide = 0; for (const k in keys) keys[k] = false; }); // 切視窗清掉卡住的按鍵
cv.addEventListener("contextmenu", e => e.preventDefault());

// ---- 任意輸入：開始 / 重來 ----
function pressAnywhere() {
  if (state === "title") { state = "play"; beep(660, .08, .15); }
  else if (state === "over" && Date.now() - overAt > 600) {
    reset(); state = "play"; beep(660, .08, .15);
  }
}

// ---- 更新一幀 ----
function update() {
  if (state !== "play") return;

  // 左右移動（帶一點慣性，手感比較滑）
  let target = 0;
  if (keys["ArrowLeft"] || keys["a"] || keys["A"] || pointerSide < 0) target -= MOVE;
  if (keys["ArrowRight"] || keys["d"] || keys["D"] || pointerSide > 0) target += MOVE;
  player.vx += (target - player.vx) * 0.3;

  const prevBottom = player.y + player.h;
  player.vy += GRAV;
  player.x += player.vx;
  player.y += player.vy;

  // 左右穿牆（從左邊出去右邊回來）
  if (player.x > W) player.x = -player.w;
  if (player.x + player.w < 0) player.x = W;

  // 平台碰撞（只在往下掉時檢查，才能從下面穿過去）
  if (player.vy > 0) {
    for (const p of plats) {
      if (player.x + player.w * 0.25 < p.x + p.w &&
          player.x + player.w * 0.75 > p.x &&
          prevBottom <= p.y + 4 &&
          player.y + player.h >= p.y) {
        player.y = p.y - player.h;
        if (p.type === "spring") { player.vy = SPRING; beep(880, .12, .2); }
        else { player.vy = JUMP; beep(520 + Math.random() * 60, .06, .12); }
        break;
      }
    }
  }

  // 會動的平台左右巡邏
  for (const p of plats) {
    if (p.type === "move") {
      p.x += p.dir * 1.4;
      if (p.x < 0 || p.x + p.w > W) p.dir *= -1;
    }
  }

  // 攝影機跟著往上（只上不下）
  if (player.y < cameraY + 240) cameraY = player.y - 240;

  // 分數 = 爬升高度
  if (player.y < minY) { minY = player.y; score = Math.floor((500 - minY) / 10); }

  // 上面不夠就補平台、掉出畫面下方的回收
  let top = Math.min(...plats.map(p => p.y));
  while (top > cameraY - 60) {
    top -= rand(52, 85 + Math.min(30, score / 10));
    plats.push(makePlat(top));
  }
  plats = plats.filter(p => p.y < cameraY + H + 40);

  // 掉出畫面 → 遊戲結束
  if (player.y > cameraY + H + 40) {
    state = "over"; overAt = Date.now();
    if (score > best) { best = score; saveBest(best); }
    beep(180, .35, .2);
    if (window.SC) SC.over(score);  // 匿名回報一局結束（數據追蹤，選配）
  }
}

// ---- 畫圖工具 ----
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function lerpc(a, b, t) { // 兩個 #rrggbb 顏色之間漸變
  const pa = [parseInt(a.slice(1, 3), 16), parseInt(a.slice(3, 5), 16), parseInt(a.slice(5, 7), 16)];
  const pb = [parseInt(b.slice(1, 3), 16), parseInt(b.slice(3, 5), 16), parseInt(b.slice(5, 7), 16)];
  const p = pa.map((v, i) => Math.round(v + (pb[i] - v) * t));
  return `rgb(${p[0]},${p[1]},${p[2]})`;
}

// ---- 畫史萊姆貓 ----
function drawCat(x, y, w, h, vy) {
  const squash = Math.max(0.82, Math.min(1.18, 1 - vy * 0.012)); // 彈跳擠壓感
  const bw = w / squash, bh = h * squash;
  const cx = x + w / 2, by = y + h;
  ctx.save();
  ctx.translate(cx, by);
  // 貓耳
  ctx.fillStyle = "#4aa53a";
  ctx.beginPath(); ctx.moveTo(-bw * .32, -bh * .75); ctx.lineTo(-bw * .18, -bh * 1.15); ctx.lineTo(-bw * .02, -bh * .8); ctx.fill();
  ctx.beginPath(); ctx.moveTo(bw * .32, -bh * .75); ctx.lineTo(bw * .18, -bh * 1.15); ctx.lineTo(bw * .02, -bh * .8); ctx.fill();
  // 史萊姆身體
  const grd = ctx.createLinearGradient(0, -bh, 0, 0);
  grd.addColorStop(0, "#7ce85a"); grd.addColorStop(1, "#4aa53a");
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.ellipse(0, -bh / 2, bw / 2, bh / 2, 0, 0, Math.PI * 2); ctx.fill();
  // 高光
  ctx.fillStyle = "rgba(255,255,255,.35)";
  ctx.beginPath(); ctx.ellipse(-bw * .18, -bh * .68, bw * .1, bh * .07, -0.5, 0, Math.PI * 2); ctx.fill();
  // 眼睛
  ctx.fillStyle = "#123b0a";
  ctx.beginPath(); ctx.arc(-bw * .14, -bh * .5, 3.2, 0, Math.PI * 2); ctx.arc(bw * .14, -bh * .5, 3.2, 0, Math.PI * 2); ctx.fill();
  // 嘴巴 ω
  ctx.strokeStyle = "#123b0a"; ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.arc(-3, -bh * .38, 3, 0, Math.PI); ctx.arc(3, -bh * .38, 3, 0, Math.PI); ctx.stroke();
  // 鬍鬚
  ctx.beginPath();
  ctx.moveTo(-bw * .3, -bh * .42); ctx.lineTo(-bw * .48, -bh * .46);
  ctx.moveTo(-bw * .3, -bh * .36); ctx.lineTo(-bw * .48, -bh * .34);
  ctx.moveTo(bw * .3, -bh * .42); ctx.lineTo(bw * .48, -bh * .46);
  ctx.moveTo(bw * .3, -bh * .36); ctx.lineTo(bw * .48, -bh * .34);
  ctx.stroke();
  ctx.restore();
}

// ---- 半透明面板 ----
function panel(y0, h0) {
  ctx.fillStyle = "rgba(15,26,12,.78)";
  roundRect(30, y0, W - 60, h0, 16); ctx.fill();
}

function titleScreen() {
  panel(140, 300);
  ctx.textAlign = "center";
  ctx.fillStyle = "#7ce85a"; ctx.font = "bold 34px 'Microsoft JhengHei',sans-serif";
  ctx.fillText("史萊姆貓彈跳", W / 2, 200);
  ctx.font = "40px sans-serif"; ctx.fillText("🐱", W / 2, 252);
  ctx.fillStyle = "#e8ffe0"; ctx.font = "15px 'Microsoft JhengHei',sans-serif";
  ctx.fillText("← → 鍵 或 按住畫面左右半邊移動", W / 2, 300);
  ctx.fillText("踩著平台一路往上，掉下去就結束", W / 2, 326);
  ctx.fillText("橘色彈簧 = 一飛沖天", W / 2, 352);
  ctx.fillStyle = "#ffd76a"; ctx.font = "bold 17px 'Microsoft JhengHei',sans-serif";
  if (Math.floor(Date.now() / 500) % 2 === 0) ctx.fillText("點一下 / 按任意鍵 開始", W / 2, 405);
  ctx.textAlign = "left";
}

function overScreen() {
  panel(170, 240);
  ctx.textAlign = "center";
  ctx.fillStyle = "#ff9b3d"; ctx.font = "bold 30px 'Microsoft JhengHei',sans-serif";
  ctx.fillText("遊戲結束", W / 2, 225);
  ctx.fillStyle = "#e8ffe0"; ctx.font = "18px 'Microsoft JhengHei',sans-serif";
  ctx.fillText("分數 " + score, W / 2, 272);
  ctx.fillText("最佳 " + best + (score >= best && score > 0 ? "  🎉新紀錄" : ""), W / 2, 302);
  ctx.fillStyle = "#ffd76a"; ctx.font = "bold 16px 'Microsoft JhengHei',sans-serif";
  if (Math.floor(Date.now() / 500) % 2 === 0) ctx.fillText("點一下 再來一局", W / 2, 362);
  ctx.textAlign = "left";
}

// ---- 畫一幀 ----
function draw() {
  // 背景：爬得越高，天色越接近太空
  const alt = Math.min(1, Math.max(0, (500 - minY) / 8000));
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, lerpc("#bfeeff", "#0b1035", alt));
  g.addColorStop(1, lerpc("#dff8d8", "#27355e", alt));
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(0, -cameraY);

  // 背景參考線（增加往上移動的感覺）
  ctx.strokeStyle = "rgba(255,255,255,.10)"; ctx.lineWidth = 1;
  const startLine = Math.floor(cameraY / 120) * 120;
  for (let ly = startLine; ly < cameraY + H + 120; ly += 120) {
    ctx.beginPath(); ctx.moveTo(0, ly); ctx.lineTo(W, ly); ctx.stroke();
  }

  // 平台
  for (const p of plats) {
    ctx.fillStyle = p.type === "move" ? "#3fae9e" : "#4c9e3e";
    roundRect(p.x, p.y, p.w, p.h, 7); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.25)";
    roundRect(p.x + 3, p.y + 2, p.w - 6, 4, 2); ctx.fill();
    if (p.type === "spring") { // 橘色彈簧墊
      ctx.fillStyle = "#ff9b3d";
      roundRect(p.x + p.w / 2 - 10, p.y - 7, 20, 7, 3); ctx.fill();
    }
  }

  // 玩家
  drawCat(player.x, player.y, player.w, player.h, player.vy);
  ctx.restore();

  // ---- 介面文字 ----
  if (state === "play") {
    ctx.font = "bold 22px 'Microsoft JhengHei',sans-serif";
    ctx.lineWidth = 4; ctx.strokeStyle = "rgba(10,25,8,.7)";
    ctx.strokeText("分數 " + score, 12, 32);
    ctx.fillStyle = "#fff"; ctx.fillText("分數 " + score, 12, 32);
    ctx.font = "13px 'Microsoft JhengHei',sans-serif";
    ctx.strokeText("最佳 " + best, 12, 54);
    ctx.fillText("最佳 " + best, 12, 54);
  }
  if (state === "title") titleScreen();
  if (state === "over") overScreen();
}

// ---- 主迴圈（固定 60 步/秒：120Hz 螢幕也不會變兩倍速）----
const STEP = 1000 / 60;
let acc = 0, last = performance.now();
function frame(now) {
  acc += now - last; last = now;
  if (acc > 100) acc = 100;  // 切去背景再回來，不狂補幀
  while (acc >= STEP) { update(); acc -= STEP; }
  draw();
  requestAnimationFrame(frame);
}
reset();
requestAnimationFrame(t => { last = t; frame(t); });
</script>
<script src="../../sc_config.js"></script>
<script src="../../stats.js"></script>
</body>
</html>
