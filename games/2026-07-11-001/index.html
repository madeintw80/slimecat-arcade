<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>喵光斬暗陣</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0812;
    font-family:-apple-system,"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{display:block;touch-action:none;background:#0a0812;
    box-shadow:0 0 40px rgba(120,90,220,.25);border-radius:6px;}
  .lobby{position:fixed;top:8px;left:10px;z-index:10;color:#9d8fd6;text-decoration:none;
    font-size:14px;background:rgba(20,16,36,.7);padding:5px 10px;border-radius:14px;
    border:1px solid rgba(140,120,220,.3);}
  .lobby:active{color:#fff;}
</style>
</head>
<body>
<div id="wrap">
  <a class="lobby" href="../../index.html">← 回遊戲區</a>
  <canvas id="c"></canvas>
</div>
<script>
"use strict";
(function(){
/* ====== 基本設定：邏輯座標固定 400x600，透過 DPR 縮放輸出 ====== */
const W=400,H=600,CX=200,CY=305;
const CAT_R=24,HIT_R=42,NEARMISS_R=82;
const TRAIL_LIFE=0.28,TRAIL_KILL_W=16;
const BEAM_LEN=320,BEAM_KILL_W=18,BEAM_ROT=3.4;
const COMBO_WINDOW=3.0;
const maxHP=3;

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let dpr=1;

/* 高解析輸出：實體緩衝 = 顯示尺寸 × devicePixelRatio(cap 3)，transform 保持邏輯座標 */
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,3);
  const scale=Math.min(window.innerWidth/W,window.innerHeight/H);
  const cssW=Math.max(1,Math.floor(W*scale)),cssH=Math.max(1,Math.floor(H*scale));
  canvas.style.width=cssW+'px';canvas.style.height=cssH+'px';
  canvas.width=Math.floor(cssW*dpr);canvas.height=Math.floor(cssH*dpr);
  ctx.setTransform(canvas.width/W,0,0,canvas.height/H,0,0);
}
window.addEventListener('resize',resize);resize();

/* ====== WebAudio 合成音效（禁外部音檔） ====== */
let AC=null;
function actx(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){AC=null;} } return AC; }
function resumeAudio(){ const ac=actx(); if(ac&&ac.state==='suspended'){ try{ac.resume();}catch(e){} } }
function blip(freq,dur,type,vol,freq2){
  const ac=actx(); if(!ac)return;
  try{
    const o=ac.createOscillator(),g=ac.createGain(),t=ac.currentTime;
    o.type=type||'sine';o.frequency.setValueAtTime(freq,t);
    if(freq2)o.frequency.exponentialRampToValueAtTime(Math.max(20,freq2),t+dur);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol||0.2,t+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+dur+0.03);
  }catch(e){}
}
function noise(dur,vol,ff){
  const ac=actx(); if(!ac)return;
  try{
    const len=Math.floor(ac.sampleRate*dur),b=ac.createBuffer(1,len,ac.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
    const n=ac.createBufferSource();n.buffer=b;
    const f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=ff||1400;
    const g=ac.createGain(),t=ac.currentTime;
    g.gain.setValueAtTime(vol||0.2,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    n.connect(f);f.connect(g);g.connect(ac.destination);n.start(t);n.stop(t+dur+0.02);
  }catch(e){}
}
function killSound(c,near){ const f=Math.min(300+c*15,1100); blip(f,0.08,'triangle',0.15,f*1.5); if(near){ noise(0.14,0.16,2200); blip(1500,0.1,'sine',0.12,900);} }
function damageSound(){ blip(160,0.22,'sawtooth',0.28,55); noise(0.18,0.2,320); }
function milestoneSound(){ blip(523,0.14,'square',0.13); blip(784,0.16,'square',0.11,1046); }
function comboDropSound(){ blip(260,0.12,'sine',0.09,120); }
function healSound(){ blip(680,0.16,'sine',0.14,1020); }
function recordSound(){ [523,659,784,1046].forEach((f,i)=>{ setTimeout(()=>blip(f,0.2,'square',0.15),i*110); }); }
function overSound(){ blip(300,0.3,'sawtooth',0.2,110); }

/* ====== 最高分（localStorage，一律 try-catch 防無痕模式炸開） ====== */
function getHS(){ try{return parseInt(localStorage.getItem('mlza_hi')||'0',10)||0;}catch(e){return 0;} }
function setHS(v){ try{localStorage.setItem('mlza_hi',String(v));}catch(e){} }

/* ====== 遊戲狀態 ====== */
let state='title';
let enemies=[],particles=[],popups=[],trail=[];
let score=0,hp=maxHP,combo=0,maxCombo=0,comboTimer=0;
let gameTime=0,spawnTimer=1.4,speedMul=1,nextHeal=450;
let invuln=0,shake=0,flash=0,hitFlash=0,healFlash=0,catSquash=1,hintTimer=0;
let slowmo=0,timeScale=1,overGuard=0;
let kbActive=false,beamAngle=-Math.PI/2;
let drawing=false,lastPt={x:0,y:0};
let waveTimer=5,warnTimer=0,warnAngles=[];
let newRecord=false,recordDiff=0;
const keys=new Set();

function comboMult(){ return Math.min(1+Math.floor(combo/6),9); }

function reset(){
  enemies.length=0;particles.length=0;popups.length=0;trail.length=0;
  score=0;hp=maxHP;combo=0;maxCombo=0;comboTimer=0;
  gameTime=0;spawnTimer=1.4;speedMul=1;nextHeal=450;
  invuln=0;shake=0;flash=0;hitFlash=0;healFlash=0;catSquash=1;slowmo=0;timeScale=1;
  kbActive=false;keys.clear();drawing=false;beamAngle=-Math.PI/2;
  waveTimer=5;warnTimer=0;warnAngles=[];
  hintTimer=getHS()>0?2.5:4.5;
}
function start(){ resumeAudio(); reset(); state='play'; }

function gameOver(){
  state='over';overGuard=0.6;
  const hs=getHS();
  newRecord=score>hs;recordDiff=hs-score;
  if(newRecord)setHS(score);
  if(newRecord)recordSound(); else overSound();
  if(window.SC){ try{ SC.over(score); }catch(e){} } // 匿名數據回報
}

/* ====== 敵人：暗影鼠，多方向逼近；三種行為維持節奏 ====== */
function makeEnemy(x,y,type){
  let r=13,sb=44;
  if(type==='dash'){ r=11;sb=40; }
  else if(type==='split'){ r=19;sb=32; }
  return {x:x,y:y,type:type,r:r,speedBase:sb,phase:Math.random()*6.28,amp:70,pulse:Math.random()*6};
}
function spawnRing(type,ang){
  if(ang==null)ang=Math.random()*Math.PI*2;
  const rr=380;
  enemies.push(makeEnemy(CX+Math.cos(ang)*rr,CY+Math.sin(ang)*rr,type));
}
function spawnAtPos(x,y,type){ enemies.push(makeEnemy(x,y,type)); }

function pickType(t){
  if(t<15)return 'basic';           // 前 15 秒只出直衝基礎鼠，建立因果
  const r=Math.random();
  if(t<40)return r<0.82?'basic':'dash';
  if(t<80){ if(r<0.55)return 'basic'; if(r<0.85)return 'dash'; return 'split'; }
  if(r<0.45)return 'basic'; if(r<0.78)return 'dash'; return 'split';
}

/* 第 3 分鐘壓力源：120 秒後每 ~20 秒一次「暗潮」——先 1.1 秒紅圈預警，再八方齊湧（可反應） */
function startWarn(){
  warnTimer=1.1;warnAngles=[];
  const n=7,base=Math.random()*6.28;
  for(let i=0;i<n;i++)warnAngles.push(base+i/n*Math.PI*2+(Math.random()-0.5)*0.3);
}
function doWave(){
  warnAngles.forEach(a=>{ spawnRing(Math.random()<0.5?'basic':'dash',a); });
  warnAngles=[];waveTimer=20;
}

/* ====== 命中 / 消滅 ====== */
function killEnemy(e,idx){
  enemies.splice(idx,1);
  combo++; if(combo>maxCombo)maxCombo=combo; comboTimer=COMBO_WINDOW;
  const mult=comboMult();
  const d=Math.hypot(e.x-CX,e.y-CY),near=d<NEARMISS_R;
  let pts=10*mult; if(near)pts=pts*2+15;
  pts=Math.round(pts);
  score+=pts;checkHeal();
  burst(e.x,e.y,e.type,near);
  popup(e.x,e.y,near?'好險 +'+pts:'+'+pts,near?'#ffffff':'#bdf5e6',near?18:14);
  killSound(combo,near);
  if(combo>0&&combo%10===0){ milestoneSound(); popup(CX,CY-72,'連擊 '+combo+'！','#ffd54a',22); }
  if(near){ slowmo=0.12; flash=0.55; }               // near-miss 慢動作＋白閃放大「好險」
  if(e.type==='split'){ spawnAtPos(e.x-14,e.y,'basic'); spawnAtPos(e.x+14,e.y,'basic'); }
}
function checkHeal(){
  while(score>=nextHeal){ nextHeal+=450; if(hp<maxHP){ hp++; healFlash=1; healSound(); popup(CX,CY-40,'+1 貓命','#7ef29a',18); } }
}
function damage(){
  hp--;combo=0;invuln=0.8;shake=11;hitFlash=1;catSquash=0.6;
  damageSound();popup(CX,CY-38,'-1','#ff5a6a',20);
  if(hp<=0)gameOver();
}

/* 點到線段距離：軌跡/光刃與敵人的碰撞判定共用 */
function segDist(ax,ay,bx,by,px,py){
  const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
  let t=l2>0?((px-ax)*dx+(py-ay)*dy)/l2:0; t=t<0?0:t>1?1:t;
  const cx=ax+t*dx,cy=ay+t*dy;
  return Math.hypot(px-cx,py-cy);
}
function segmentKill(ax,ay,bx,by){
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(segDist(ax,ay,bx,by,e.x,e.y)<=e.r+TRAIL_KILL_W)killEnemy(e,i);
  }
  // 沿軌跡灑火花
  const mx=(ax+bx)/2,my=(ay+by)/2;
  particles.push({x:mx,y:my,vx:(Math.random()-0.5)*40,vy:(Math.random()-0.5)*40,life:0.3,max:0.3,size:3,color:'#8ff'});
}
function beamKill(){
  const ex=CX+Math.cos(beamAngle)*BEAM_LEN,ey=CY+Math.sin(beamAngle)*BEAM_LEN;
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(segDist(CX,CY,ex,ey,e.x,e.y)<=e.r+BEAM_KILL_W)killEnemy(e,i);
  }
}

/* ====== 粒子 / 飄字 ====== */
function burst(x,y,type,near){
  const n=near?26:14;
  const col=type==='dash'?'#7aa8ff':type==='split'?'#ff8ac0':'#c79bff';
  for(let i=0;i<n;i++){
    const a=Math.random()*6.28,sp=40+Math.random()*(near?260:170);
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.4+Math.random()*0.4,max:0.8,size:2+Math.random()*3,color:i%3===0?'#fff':col});
  }
  if(particles.length>340)particles.splice(0,particles.length-340);
}
function popup(x,y,text,color,size){ popups.push({x:x,y:y,vy:-40,text:text,life:0.9,max:0.9,color:color,size:size||14}); }
function updateParticles(sdt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*sdt;p.y+=p.vy*sdt;
    const k=1-3*sdt;p.vx*=k>0?k:0;p.vy*=k>0?k:0;
    p.life-=sdt; if(p.life<=0)particles.splice(i,1);
  }
}
function updatePopups(sdt){
  for(let i=popups.length-1;i>=0;i--){
    const p=popups[i];p.y+=p.vy*sdt;p.vy*=0.92;p.life-=sdt;
    if(p.life<=0)popups.splice(i,1);
  }
}

/* ====== 更新（固定時間步長，120Hz 不會變兩倍速） ====== */
function updateEnemy(e,sdt,i){
  const dx=CX-e.x,dy=CY-e.y,d=Math.hypot(dx,dy)||1,ux=dx/d,uy=dy/d;
  const spd=e.speedBase*speedMul;
  e.x+=ux*spd*sdt;e.y+=uy*spd*sdt;
  if(e.type==='dash'){ e.phase+=sdt*4.5; const w=Math.sin(e.phase)*e.amp; e.x+=-uy*w*sdt; e.y+=ux*w*sdt; } // 繞路擺動
  e.pulse+=sdt*6;
  if(d<HIT_R){
    enemies.splice(i,1);
    if(invuln<=0)damage(); else burst(e.x,e.y,e.type,false); // 無敵幀期間無害消散，避免連環秒殺
  }
}
function update(sdt){
  gameTime+=sdt;
  speedMul=Math.min(0.8+gameTime*0.011,3.0);               // 速度隨時間持續增壓（硬性驗收）
  spawnTimer-=sdt;
  const interval=Math.max(0.40,2.1-gameTime*0.012);        // 出怪頻率隨時間變密
  if(spawnTimer<=0){ spawnRing(pickType(gameTime)); spawnTimer=interval*(0.8+Math.random()*0.4); }
  if(gameTime>=120){
    if(warnTimer>0){ warnTimer-=sdt; if(warnTimer<=0)doWave(); }
    else { waveTimer-=sdt; if(waveTimer<=0)startWarn(); }
  }
  for(let i=enemies.length-1;i>=0;i--)updateEnemy(enemies[i],sdt,i);
  if(comboTimer>0){ comboTimer-=sdt; if(comboTimer<=0&&combo>0){ combo=0; comboDropSound(); } }
  if(invuln>0)invuln-=sdt;
  if(kbActive){ if(keys.has('L'))beamAngle-=BEAM_ROT*sdt; if(keys.has('R'))beamAngle+=BEAM_ROT*sdt; beamKill(); }
  updateParticles(sdt);updatePopups(sdt);
  for(let i=trail.length-1;i>=0;i--){ trail[i].age+=sdt; if(trail[i].age>TRAIL_LIFE)trail.splice(i,1); }
  if(flash>0)flash-=sdt*2; if(shake>0){shake-=sdt*24;if(shake<0)shake=0;}
  if(hitFlash>0)hitFlash-=sdt*3; if(healFlash>0)healFlash-=sdt*2;
  if(catSquash<1){ catSquash+=(1-catSquash)*Math.min(1,sdt*10); if(catSquash>0.999)catSquash=1; }
  if(hintTimer>0)hintTimer-=sdt;
}

/* ====== 繪製 ====== */
function nearestDist(){
  let m=9999;
  for(let i=0;i<enemies.length;i++){ const e=enemies[i],d=Math.hypot(e.x-CX,e.y-CY); if(d<m)m=d; }
  return m;
}
function drawHeart(x,y,s,filled){
  ctx.save();ctx.translate(x,y);ctx.beginPath();
  ctx.moveTo(0,s*0.3);
  ctx.bezierCurveTo(s*0.5,-s*0.4,s*1.1,s*0.15,0,s*0.95);
  ctx.bezierCurveTo(-s*1.1,s*0.15,-s*0.5,-s*0.4,0,s*0.3);
  ctx.closePath();
  if(filled){ ctx.fillStyle='#ff5d7a';ctx.fill(); }
  else{ ctx.fillStyle='rgba(255,120,150,.18)';ctx.fill();ctx.strokeStyle='rgba(255,120,150,.5)';ctx.lineWidth=1.5;ctx.stroke(); }
  ctx.restore();
}
function drawEnemy(e){
  const col=e.type==='dash'?'#4560a8':e.type==='split'?'#8a3c6e':'#5b3f96';
  const gl=e.type==='dash'?'#7aa8ff':e.type==='split'?'#ff8ac0':'#b28bff';
  const s=1+Math.sin(e.pulse)*0.06;
  ctx.save();ctx.translate(e.x,e.y);ctx.scale(s,s);
  ctx.shadowColor=gl;ctx.shadowBlur=12;
  // 耳朵
  ctx.fillStyle=col;
  ctx.beginPath();ctx.arc(-e.r*0.55,-e.r*0.7,e.r*0.42,0,6.28);ctx.arc(e.r*0.55,-e.r*0.7,e.r*0.42,0,6.28);ctx.fill();
  // 身體
  ctx.beginPath();ctx.arc(0,0,e.r,0,6.28);ctx.fill();
  ctx.shadowBlur=0;
  // 紅眼
  ctx.fillStyle='#ff4d5e';
  ctx.beginPath();ctx.arc(-e.r*0.35,-e.r*0.1,e.r*0.16,0,6.28);ctx.arc(e.r*0.35,-e.r*0.1,e.r*0.16,0,6.28);ctx.fill();
  ctx.restore();
}
function drawCat(threat){
  ctx.save();ctx.translate(CX,CY);
  const sq=catSquash,sx=1+(1-sq)*0.5,sy=sq;
  // 判定光環（受威脅時泛紅）
  const ringA=0.25+Math.max(0,(140-threat)/140)*0.5;
  ctx.strokeStyle=threat<130?'rgba(255,90,110,'+ringA+')':'rgba(130,255,180,.25)';
  ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,HIT_R,0,6.28);ctx.stroke();
  if(invuln>0 && Math.floor(invuln*20)%2===0)ctx.globalAlpha=0.4; // 無敵閃爍
  ctx.scale(sx,sy);
  // 貓耳
  ctx.fillStyle='#6fd65a';
  ctx.beginPath();ctx.moveTo(-CAT_R*0.7,-CAT_R*0.5);ctx.lineTo(-CAT_R*0.95,-CAT_R*1.25);ctx.lineTo(-CAT_R*0.25,-CAT_R*0.75);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(CAT_R*0.7,-CAT_R*0.5);ctx.lineTo(CAT_R*0.95,-CAT_R*1.25);ctx.lineTo(CAT_R*0.25,-CAT_R*0.75);ctx.closePath();ctx.fill();
  // 身體（史萊姆貓：綠色史萊姆＋光澤）
  ctx.shadowColor='#8dff7a';ctx.shadowBlur=14;
  const g=ctx.createRadialGradient(-6,-8,4,0,0,CAT_R);
  g.addColorStop(0,'#a9f79a');g.addColorStop(1,'#57c246');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,CAT_R,0,6.28);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();ctx.arc(-CAT_R*0.35,-CAT_R*0.4,CAT_R*0.22,0,6.28);ctx.fill();
  // 表情
  ctx.fillStyle='#173a12';
  const worried=threat<120;
  const eyeY=-CAT_R*0.05;
  if(worried){
    ctx.lineWidth=3;ctx.strokeStyle='#173a12';
    ctx.beginPath();ctx.moveTo(-CAT_R*0.55,eyeY-3);ctx.lineTo(-CAT_R*0.2,eyeY+1);ctx.moveTo(CAT_R*0.55,eyeY-3);ctx.lineTo(CAT_R*0.2,eyeY+1);ctx.stroke();
    ctx.beginPath();ctx.arc(0,CAT_R*0.45,CAT_R*0.2,0,Math.PI,false);ctx.stroke(); // 張嘴驚
  }else{
    ctx.beginPath();ctx.arc(-CAT_R*0.38,eyeY,CAT_R*0.14,0,6.28);ctx.arc(CAT_R*0.38,eyeY,CAT_R*0.14,0,6.28);ctx.fill();
    ctx.lineWidth=2.5;ctx.strokeStyle='#173a12';
    if(combo>=6){ ctx.beginPath();ctx.arc(0,CAT_R*0.28,CAT_R*0.26,0.15*Math.PI,0.85*Math.PI,false);ctx.stroke(); } // 微笑
    else{ ctx.beginPath();ctx.moveTo(-CAT_R*0.12,CAT_R*0.38);ctx.lineTo(CAT_R*0.12,CAT_R*0.38);ctx.stroke(); }
  }
  ctx.restore();
}
function drawTrail(){
  if(trail.length<2)return;
  ctx.save();ctx.lineCap='round';ctx.lineJoin='round';ctx.shadowColor='#7ff';ctx.shadowBlur=14;
  for(let i=1;i<trail.length;i++){
    const a=trail[i-1],b=trail[i];
    const al=1-b.age/TRAIL_LIFE;
    ctx.strokeStyle='rgba(180,255,255,'+(al*0.9)+')';
    ctx.lineWidth=3+al*10;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  }
  const h=trail[trail.length-1];
  ctx.fillStyle='rgba(255,255,255,.9)';ctx.beginPath();ctx.arc(h.x,h.y,5,0,6.28);ctx.fill();
  ctx.restore();
}
function drawBeam(){
  if(!kbActive)return;
  const ex=CX+Math.cos(beamAngle)*BEAM_LEN,ey=CY+Math.sin(beamAngle)*BEAM_LEN;
  ctx.save();ctx.lineCap='round';ctx.shadowColor='#8ff';ctx.shadowBlur=16;
  ctx.strokeStyle='rgba(160,255,255,.85)';ctx.lineWidth=8;
  ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(ex,ey);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.9)';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(ex,ey);ctx.stroke();
  ctx.restore();
}
function drawParticles(){
  for(let i=0;i<particles.length;i++){
    const p=particles[i],a=Math.max(0,p.life/p.max);
    ctx.globalAlpha=a;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,6.28);ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawPopups(){
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=0;i<popups.length;i++){
    const p=popups[i],a=Math.max(0,p.life/p.max);
    ctx.globalAlpha=a;ctx.fillStyle=p.color;
    ctx.font='700 '+p.size+'px sans-serif';
    ctx.fillText(p.text,p.x,p.y);
  }
  ctx.globalAlpha=1;
}
function drawHUD(){
  // 生命
  for(let i=0;i<maxHP;i++)drawHeart(20+i*22,26,10,i<hp);
  // 分數
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle='#fff';ctx.font='700 30px sans-serif';
  ctx.fillText(score,W/2,36);
  ctx.fillStyle='#9d8fd6';ctx.font='11px sans-serif';
  ctx.fillText('最高 '+getHS()+'　時間 '+Math.floor(gameTime)+'s',W/2,52);
  // 連擊倍率
  const mult=comboMult();
  ctx.textAlign='right';
  ctx.fillStyle=mult>=3?'#ffd54a':'#c9bdf0';ctx.font='700 22px sans-serif';
  ctx.fillText('×'+mult,W-16,30);
  if(combo>0){
    ctx.font='11px sans-serif';ctx.fillStyle='#9d8fd6';ctx.fillText('連擊 '+combo,W-16,44);
    const bw=64,bx=W-16-bw,by=50,r=Math.max(0,comboTimer/COMBO_WINDOW);
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(bx,by,bw,4);
    ctx.fillStyle='#ffd54a';ctx.fillRect(bx,by,bw*r,4);
  }
  ctx.textAlign='left';
  // 首局提示
  if(hintTimer>0){
    ctx.globalAlpha=Math.min(1,hintTimer);
    ctx.textAlign='center';ctx.fillStyle='#bdf5e6';ctx.font='700 16px sans-serif';
    ctx.fillText('劃過暗影鼠就能斬掉牠！',W/2,H-40);
    ctx.textAlign='left';ctx.globalAlpha=1;
  }
}
function drawWarn(){
  if(warnTimer<=0)return;
  const a=0.4+Math.sin(gameTime*30)*0.3;
  ctx.save();
  warnAngles.forEach(ang=>{
    const x=CX+Math.cos(ang)*350,y=CY+Math.sin(ang)*350;
    ctx.strokeStyle='rgba(255,70,90,'+a+')';ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(x,y,20,0,6.28);ctx.stroke();
  });
  ctx.restore();
  ctx.textAlign='center';ctx.fillStyle='rgba(255,90,110,'+a+')';ctx.font='700 20px sans-serif';
  ctx.fillText('暗潮來襲！',W/2,120);ctx.textAlign='left';
}
function drawBG(threat){
  const g=ctx.createRadialGradient(CX,CY,20,CX,CY,340);
  g.addColorStop(0,'#181233');g.addColorStop(1,'#0a0812');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // 威脅泛紅暈影
  const ti=Math.max(0,(150-threat)/150);
  if(ti>0){ ctx.fillStyle='rgba(120,20,40,'+(ti*0.28)+')'; ctx.fillRect(0,0,W,H); }
}

/* ====== 標題 / 結束 疊層 ====== */
function drawTitle(){
  ctx.textAlign='center';
  ctx.fillStyle='#8dff7a';ctx.shadowColor='#8dff7a';ctx.shadowBlur=18;
  ctx.font='700 40px sans-serif';ctx.fillText('喵光斬暗陣',W/2,180);ctx.shadowBlur=0;
  ctx.font='34px sans-serif';ctx.fillText('🐾✨',W/2,235);
  ctx.fillStyle='#e8e0ff';ctx.font='700 16px sans-serif';
  ctx.fillText('劃出爪光，一線掃飛四面暗影鼠！',W/2,290);
  ctx.fillStyle='#b8abe6';ctx.font='14px sans-serif';
  ctx.fillText('手指／滑鼠：劃線斬擊',W/2,330);
  ctx.fillText('鍵盤 ←→（A／D）：轉動光刃',W/2,354);
  ctx.fillText('連擊不斷＝分數暴增，被碰到就斷連擊',W/2,382);
  const hs=getHS();
  ctx.fillStyle='#ffd54a';ctx.font='700 15px sans-serif';
  ctx.fillText(hs>0?('今日目標：超越 '+hs+' 分！'):'守住貓命，衝出你的第一個紀錄！',W/2,430);
  if(Math.floor(Date.now?0:0)+Math.floor(performance.now()/500)%2===0){} // noop
  ctx.fillStyle='#ffffff';ctx.font='700 20px sans-serif';
  const blink=0.55+0.45*Math.sin(performance.now()/300);
  ctx.globalAlpha=blink;ctx.fillText('點擊 / 按空白鍵 開始',W/2,500);ctx.globalAlpha=1;
  ctx.textAlign='left';
}
function drawOver(){
  ctx.fillStyle='rgba(8,6,18,.72)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  if(newRecord){
    ctx.fillStyle='#ffd54a';ctx.shadowColor='#ffd54a';ctx.shadowBlur=16;
    ctx.font='700 34px sans-serif';ctx.fillText('新紀錄！🎉',W/2,220);ctx.shadowBlur=0;
  }else{
    ctx.fillStyle='#ff8a9a';ctx.font='700 32px sans-serif';ctx.fillText('貓命歸零',W/2,220);
  }
  ctx.fillStyle='#fff';ctx.font='700 44px sans-serif';ctx.fillText(score,W/2,285);
  ctx.fillStyle='#b8abe6';ctx.font='15px sans-serif';
  ctx.fillText('最高連擊 ×'+maxCombo+'　存活 '+Math.floor(gameTime)+' 秒',W/2,320);
  if(newRecord){
    ctx.fillStyle='#8dff7a';ctx.font='700 17px sans-serif';ctx.fillText('史上最強的一斬！',W/2,360);
  }else{
    const diff=recordDiff<=0?1:recordDiff;
    ctx.fillStyle='#ffd54a';ctx.font='700 17px sans-serif';
    ctx.fillText('只差 '+diff+' 分就破紀錄！',W/2,360);
  }
  ctx.fillStyle='#ffffff';ctx.font='700 19px sans-serif';
  const blink=0.55+0.45*Math.sin(performance.now()/300);
  ctx.globalAlpha=blink;ctx.fillText('點一下 / 空白鍵 再來一局',W/2,430);ctx.globalAlpha=1;
  ctx.textAlign='left';
}

function render(){
  const threat=state==='play'?nearestDist():9999;
  ctx.save();
  if(shake>0){ ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake); }
  drawBG(threat);
  if(state==='play'||state==='over'){
    drawWarn();
    for(let i=0;i<enemies.length;i++)drawEnemy(enemies[i]);
    drawBeam();
    drawCat(threat);
    drawTrail();
    drawParticles();
    drawPopups();
  }
  ctx.restore();
  // 全螢幕閃光疊層（不受震動位移）
  if(flash>0){ ctx.fillStyle='rgba(255,255,255,'+(flash*0.5)+')';ctx.fillRect(0,0,W,H); }
  if(hitFlash>0){ ctx.fillStyle='rgba(255,40,60,'+(hitFlash*0.35)+')';ctx.fillRect(0,0,W,H); }
  if(healFlash>0){ ctx.fillStyle='rgba(90,255,140,'+(healFlash*0.25)+')';ctx.fillRect(0,0,W,H); }
  if(state==='play'){ drawHUD(); }
  else if(state==='title'){ drawTitle(); }
  else if(state==='over'){ drawHUD(); drawOver(); }
}

/* ====== 主迴圈：固定時間步長 accumulator，slowmo 以真實 dt 計時 ====== */
let last=performance.now(),acc=0;const STEP=1/60;
function frame(now){
  let dt=(now-last)/1000;last=now;if(dt>0.25)dt=0.25;
  if(slowmo>0){ slowmo-=dt; timeScale=0.32; } else timeScale=1;
  if(overGuard>0)overGuard-=dt;
  if(state==='play'){
    acc+=dt;let steps=0;
    while(acc>=STEP&&steps<5){ update(STEP*timeScale); acc-=STEP; steps++; }
    if(steps>=5)acc=0;
  }
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ====== 輸入：座標一律用 getBoundingClientRect 比例換算回邏輯座標 ====== */
function toLocal(e){
  const r=canvas.getBoundingClientRect();
  return {x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H};
}
canvas.addEventListener('pointerdown',function(e){
  e.preventDefault();
  const p=toLocal(e);
  if(state==='title'){ start(); return; }
  if(state==='over'){ if(overGuard<=0)start(); return; }
  drawing=true;lastPt.x=p.x;lastPt.y=p.y;
  trail.push({x:p.x,y:p.y,age:0});
});
window.addEventListener('pointermove',function(e){
  if(state!=='play'||!drawing)return;
  const p=toLocal(e);
  segmentKill(lastPt.x,lastPt.y,p.x,p.y);
  trail.push({x:p.x,y:p.y,age:0});
  lastPt.x=p.x;lastPt.y=p.y;
},{passive:true});
window.addEventListener('pointerup',function(){ drawing=false; });
canvas.addEventListener('pointercancel',function(){ drawing=false; });
window.addEventListener('blur',function(){ drawing=false; keys.clear(); }); // 切視窗清輸入，防卡鍵/自走

window.addEventListener('keydown',function(e){
  const c=e.code;
  if(c==='ArrowLeft'||c==='ArrowRight'||c==='KeyA'||c==='KeyD'||c==='Space'||e.key===' ')e.preventDefault();
  if(c==='Space'||e.key==='Enter'){
    if(state!=='play'){ if(state==='over'&&overGuard>0)return; start(); }
    return;
  }
  if(state==='play'){
    if(c==='ArrowLeft'||c==='KeyA'){ keys.add('L'); if(!kbActive){kbActive=true;} }
    if(c==='ArrowRight'||c==='KeyD'){ keys.add('R'); if(!kbActive){kbActive=true;} }
  }
});
window.addEventListener('keyup',function(e){
  const c=e.code;
  if(c==='ArrowLeft'||c==='KeyA')keys.delete('L');
  if(c==='ArrowRight'||c==='KeyD')keys.delete('R');
});
})();
</script>
