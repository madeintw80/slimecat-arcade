<!DOCTYPE html>

<script>
"use strict";
(function(){
// ====== 基本設定 ======
const LOGICAL_W=400, LOGICAL_H=600;                 // 邏輯座標維持 400x600 直式
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let scale=1, dpr=1;

// 高解析度輸出：實體緩衝 = 顯示尺寸 × dpr(cap3)，用 setTransform 讓邏輯座標維持 400x600
function resize(){
  const maxW=window.innerWidth, maxH=window.innerHeight;
  scale=Math.min(maxW/LOGICAL_W, maxH/LOGICAL_H);
  dpr=Math.min(window.devicePixelRatio||1, 3);
  canvas.style.width=(LOGICAL_W*scale)+'px';
  canvas.style.height=(LOGICAL_H*scale)+'px';
  canvas.width=Math.round(LOGICAL_W*scale*dpr);
  canvas.height=Math.round(LOGICAL_H*scale*dpr);
  ctx.setTransform(scale*dpr,0,0,scale*dpr,0,0);
}
window.addEventListener('resize',resize);

// ====== 音效（WebAudio 合成，零外部資源）======
let ac=null;
function initAudio(){
  if(!ac){ try{ ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ ac=null; } }
  if(ac&&ac.state==='suspended'){ ac.resume(); }
}
function tone(freq,dur,type,vol,slide,delay){
  if(!ac) return;
  try{
    const t=ac.currentTime+(delay||0);
    const o=ac.createOscillator(), g=ac.createGain();
    o.type=type||'sine'; o.frequency.setValueAtTime(freq,t);
    if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(1,slide),t+dur);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t+dur+0.03);
  }catch(e){}
}
function noise(dur,vol,cut){
  if(!ac) return;
  try{
    const n=Math.floor(ac.sampleRate*dur);
    const buf=ac.createBuffer(1,n,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const s=ac.createBufferSource(); s.buffer=buf;
    const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=cut||900;
    const g=ac.createGain(); g.gain.value=vol;
    s.connect(f); f.connect(g); g.connect(ac.destination); s.start();
  }catch(e){}
}
function sOpen(k){ tone(430+Math.min(k,10)*32,0.08,'triangle',0.16,640+k*30); }
function sChain(k){ for(let i=0;i<Math.min(k,6);i++) tone(500+i*90,0.07,'triangle',0.13,null,i*0.045); }
function sFlag(){ tone(300,0.05,'square',0.12,220); }
function sBoom(){ noise(0.55,0.5,700); tone(95,0.5,'sawtooth',0.32,38); }
function sWin(){ [523,659,784,1046].forEach((f,i)=>tone(f,0.16,'triangle',0.2,null,i*0.09)); }
function sRecord(){ [784,988,1318,1568,2093].forEach((f,i)=>tone(f,0.2,'triangle',0.2,null,i*0.1)); }
function sTick(){ tone(920,0.05,'square',0.15); }

// ====== 遊戲狀態 ======
let state='title';                 // title / play / over
let rows=5, cols=5, bombs=4;
let cells=[];                      // {bomb,open,flag,n,exploded}
let rowBombs=[], colBombs=[];
let firstClick=true;
let score=0, best=0, level=1;
let timed=false, timer=0, timeLimit=0, lastTick=-1;
let winning=false, winAnim=0, winBonus=0;
let cursor={r:0,c:0}, showCursor=false;
let flagMode=false;
let shake=0, flash=0;
let particles=[], popups=[], stars=[];
let overReason='', newRecord=false, overDiff=0, scoredOver=false;
let layout={cell:44,x0:30,y0:180};

try{ best=parseInt(localStorage.getItem('meowdefuse_best')||'0',10)||0; }catch(e){ best=0; }

// 數字顏色（鄰接地雷數 1-8）
const NUMCOL=['#000','#6ec6ff','#7ce38b','#ff8f6b','#c99bff','#ffd166','#4dd0e1','#ff6b9d','#b0bec5'];

// 星空背景
for(let i=0;i<46;i++) stars.push({x:Math.random()*400,y:Math.random()*600,
  r:Math.random()*1.4+0.3, a:Math.random()*0.6+0.2, tw:Math.random()*2});

// ====== 關卡參數（隨等級：格數變大、密度上升；第3關起加拆彈倒數＝第3分鐘新壓力源）======
function boardParams(lv){
  let s,b;
  if(lv<=1){s=5;b=4;}
  else if(lv===2){s=6;b=6;}
  else if(lv===3){s=6;b=8;}
  else if(lv===4){s=7;b=11;}
  else if(lv===5){s=7;b=13;}
  else if(lv===6){s=8;b=16;}
  else {s=8;b=Math.min(16+(lv-6)*2,30);}
  return {rows:s,cols:s,bombs:b,timed:lv>=3};
}

function computeLayout(){
  const gutter=24, boardTop=152, bottomBar=64, marginX=8;
  const availW=LOGICAL_W-marginX*2-gutter;
  const availH=LOGICAL_H-boardTop-bottomBar-gutter;
  let cell=Math.floor(Math.min(availW/cols, availH/rows));
  const gw=cell*cols, gh=cell*rows;
  const x0=Math.round((LOGICAL_W-(gw+gutter))/2)+gutter;
  const y0=boardTop+gutter+Math.round((availH-gh)/2);
  layout={cell:cell,x0:x0,y0:y0,gutter:gutter,gw:gw,gh:gh};
}

function newBoard(){
  const p=boardParams(level);
  rows=p.rows; cols=p.cols; bombs=p.bombs; timed=p.timed;
  cells=[];
  for(let i=0;i<rows*cols;i++) cells.push({bomb:false,open:false,flag:false,n:0,exploded:false});
  rowBombs=new Array(rows).fill(0);
  colBombs=new Array(cols).fill(0);
  firstClick=true; winning=false; winAnim=0;
  const safe=rows*cols-bombs;
  timeLimit=Math.max(35, Math.round(safe*Math.max(1.7, 2.5-(level-3)*0.12)));
  timer=0; lastTick=-1;
  computeLayout();
  cursor={r:Math.floor(rows/2),c:Math.floor(cols/2)};
}

function startRun(){
  score=0; level=1; scoredOver=false; showCursor=false; flagMode=false;
  particles=[]; popups=[]; shake=0; flash=0;
  newBoard();
  state='play';
}

// 首擊後生成盤面：保證第一格與其鄰域絕對安全（零風險起手＋前15秒不會死）
function generateBoard(sr,sc){
  const forbidden=new Set();
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    const r=sr+dr, c=sc+dc;
    if(r>=0&&r<rows&&c>=0&&c<cols) forbidden.add(r*cols+c);
  }
  const idxs=[];
  for(let i=0;i<cells.length;i++) if(!forbidden.has(i)) idxs.push(i);
  for(let i=idxs.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=idxs[i]; idxs[i]=idxs[j]; idxs[j]=t; }
  const b=Math.min(bombs, idxs.length);
  bombs=b;
  for(let i=0;i<b;i++) cells[idxs[i]].bomb=true;
  rowBombs=new Array(rows).fill(0); colBombs=new Array(cols).fill(0);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    if(cells[r*cols+c].bomb){ rowBombs[r]++; colBombs[c]++; }
  }
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    let n=0;
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
      if(dr===0&&dc===0) continue;
      const rr=r+dr, cc=c+dc;
      if(rr>=0&&rr<rows&&cc>=0&&cc<cols&&cells[rr*cols+cc].bomb) n++;
    }
    cells[r*cols+c].n=n;
  }
}

// ====== 互動邏輯 ======
function cellIdx(r,c){ return r*cols+c; }
function inRange(r,c){ return r>=0&&r<rows&&c>=0&&c<cols; }

function revealCell(r,c){
  if(state!=='play'||winning) return;
  if(!inRange(r,c)) return;
  const cell=cells[cellIdx(r,c)];
  if(cell.open||cell.flag) return;
  if(firstClick){ generateBoard(r,c); firstClick=false; if(timed) timer=timeLimit; }
  const cc=cells[cellIdx(r,c)];
  if(cc.bomb){                              // 踩雷：炸毛
    cc.open=true; cc.exploded=true;
    gameOver('踩到炸毛地雷了！');
    return;
  }
  // 展開（0 的格子連鎖開啟＝掃乾淨爽感）
  const stack=[[r,c]]; let openedNow=0;
  while(stack.length){
    const cur=stack.pop();
    const rr=cur[0], ccx=cur[1];
    const cel=cells[cellIdx(rr,ccx)];
    if(cel.open||cel.flag||cel.bomb) continue;
    cel.open=true; openedNow++;
    spawnOpen(rr,ccx);
    if(cel.n===0){
      for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
        if(dr===0&&dc===0) continue;
        const nr=rr+dr, nc=ccx+dc;
        if(inRange(nr,nc)){ const nb=cells[cellIdx(nr,nc)]; if(!nb.open&&!nb.flag&&!nb.bomb) stack.push([nr,nc]); }
      }
    }
  }
  score+=openedNow*10;
  if(openedNow>=4){ score+=openedNow*5; popup('淨空 x'+openedNow, layout.x0+layout.gw/2, layout.y0+layout.gh/2-10, '#8ef2b0', 22); sChain(openedNow); }
  else sOpen(openedNow);
  checkClear();
}

function toggleFlag(r,c){
  if(state!=='play'||winning) return;
  if(!inRange(r,c)) return;
  if(firstClick) return;                    // 生成盤前不給插旗
  const cell=cells[cellIdx(r,c)];
  if(cell.open) return;
  cell.flag=!cell.flag;
  sFlag();
  spawnFlag(r,c,cell.flag);
}

function checkClear(){
  for(let i=0;i<cells.length;i++){ if(!cells[i].bomb&&!cells[i].open) return; }
  // 全數安全格開完 → 過關
  winBonus=100*level;
  if(timed){ winBonus+=Math.max(0,Math.floor(timer))*3; }
  score+=winBonus;
  winning=true; winAnim=1.6;
  sWin();
  for(let i=0;i<28;i++) confetti(layout.x0+layout.gw/2, layout.y0+layout.gh/2);
  popup('整盤淨空！', layout.x0+layout.gw/2, layout.y0+layout.gh/2-46, '#ffe08a', 24);
}

function gameOver(reason){
  if(state!=='play') return;
  state='over'; overReason=reason; winning=false;
  shake=1; flash=0.6; sBoom();
  // 爆炸粒子
  const src=cells.find(c=>c.exploded);
  let bx=layout.x0+layout.gw/2, by=layout.y0+layout.gh/2;
  if(src){ const i=cells.indexOf(src); const r=Math.floor(i/cols), c=i%cols;
    bx=layout.x0+c*layout.cell+layout.cell/2; by=layout.y0+r*layout.cell+layout.cell/2; }
  for(let i=0;i<34;i++) boomP(bx,by);
  // 破紀錄判定（near-miss 再利用）
  if(score>best){ best=score; newRecord=true; overDiff=0; try{ localStorage.setItem('meowdefuse_best',String(best)); }catch(e){}
    tone(1,0.01,'sine',0.001,null,0); setTimeout(sRecord,220); }
  else { newRecord=false; overDiff=best-score; }
  if(!scoredOver){ scoredOver=true; if(window.SC){ try{ SC.over(score); }catch(e){} } }
}

// ====== 粒子 / 浮字 ======
function spawnOpen(r,c){
  const x=layout.x0+c*layout.cell+layout.cell/2, y=layout.y0+r*layout.cell+layout.cell/2;
  for(let i=0;i<4;i++){ const a=Math.random()*6.28, sp=Math.random()*50+20;
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.45,max:0.45,g:120,size:Math.random()*3+1.5,color:'#8ef2b0'}); }
}
function spawnFlag(r,c,on){
  if(!on) return;
  const x=layout.x0+c*layout.cell+layout.cell/2, y=layout.y0+r*layout.cell+layout.cell/2;
  for(let i=0;i<6;i++){ const a=Math.random()*6.28, sp=Math.random()*60+30;
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.4,max:0.4,g:150,size:Math.random()*3+1.5,color:'#ffb15a'}); }
}
function boomP(x,y){ const a=Math.random()*6.28, sp=Math.random()*220+60;
  particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.8,max:0.8,g:260,size:Math.random()*4+2,
    color:['#ff5a3c','#ffb15a','#ffe08a','#ff2d55'][Math.floor(Math.random()*4)]}); }
function confetti(x,y){ const a=Math.random()*6.28, sp=Math.random()*200+50;
  particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-60,life:1.3,max:1.3,g:300,size:Math.random()*4+2,
    color:['#8ef2b0','#ffe08a','#6ec6ff','#ff6b9d','#c99bff'][Math.floor(Math.random()*5)]}); }
function popup(t,x,y,color,size){ popups.push({t:t,x:x,y:y,life:1.1,max:1.1,color:color,size:size||18,vy:-38}); }

function updateParticles(dt){
  for(const p of particles){ p.life-=dt; p.vx*=0.92; p.vy+=p.g*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; }
  particles=particles.filter(p=>p.life>0);
  if(particles.length>420) particles.splice(0,particles.length-420);
  for(const p of popups){ p.life-=dt; p.y+=p.vy*dt; p.vy*=0.94; }
  popups=popups.filter(p=>p.life>0);
}

// ====== 主迴圈（deltaTime，不假設 60fps）======
let lastT=0;
function frame(now){
  requestAnimationFrame(frame);
  if(!lastT) lastT=now;
  let dt=(now-lastT)/1000; lastT=now;
  if(dt>0.05) dt=0.05;                       // 避免分頁切回時暴衝
  try{ update(dt); draw(); }catch(e){}
}
function update(dt){
  updateParticles(dt);
  shake=Math.max(0,shake-dt*2.6);
  flash=Math.max(0,flash-dt*1.8);
  if(state==='play'){
    if(winning){
      winAnim-=dt;
      if(winAnim<=0){ winning=false; level++; newBoard(); }
    } else if(timed && !firstClick){
      timer-=dt;
      if(timer<=10 && timer>0){ const s=Math.ceil(timer); if(s!==lastTick){ lastTick=s; sTick(); flash=Math.max(flash,0.3); } }
      if(timer<=0){ timer=0; gameOver('拆彈超時，天亮了！'); }
    }
  }
}

// ====== 繪圖 ======
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function drawBackground(){
  const g=ctx.createLinearGradient(0,0,0,600);
  g.addColorStop(0,'#0f1030'); g.addColorStop(1,'#221a3c');
  ctx.fillStyle=g; ctx.fillRect(0,0,400,600);
  ctx.save();
  for(const s of stars){ ctx.globalAlpha=s.a*(0.6+0.4*Math.sin(now01()*2+s.tw)); ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,7); ctx.fill(); }
  ctx.restore();
  // 一輪彎月
  ctx.save(); ctx.globalAlpha=0.85; ctx.fillStyle='#ffe9a8';
  ctx.beginPath(); ctx.arc(348,52,20,0,7); ctx.fill();
  ctx.fillStyle='#141033'; ctx.beginPath(); ctx.arc(340,46,18,0,7); ctx.fill();
  ctx.restore();
}
let _t0=performance.now();
function now01(){ return (performance.now()-_t0)/1000; }

function drawSlimeCat(cx,cy,r,mood){
  ctx.save();
  ctx.fillStyle='#57c47a';
  ctx.beginPath(); ctx.moveTo(cx-r*0.7,cy-r*0.4); ctx.lineTo(cx-r*0.45,cy-r*1.05); ctx.lineTo(cx-r*0.08,cy-r*0.55); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx+r*0.7,cy-r*0.4); ctx.lineTo(cx+r*0.45,cy-r*1.05); ctx.lineTo(cx+r*0.08,cy-r*0.55); ctx.closePath(); ctx.fill();
  const g=ctx.createLinearGradient(cx,cy-r,cx,cy+r); g.addColorStop(0,'#7ee6a0'); g.addColorStop(1,'#45b06e');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,0);
  ctx.lineTo(cx+r,cy+r*0.5);
  ctx.quadraticCurveTo(cx+r*0.6,cy+r,cx+r*0.4,cy+r*0.6);
  ctx.quadraticCurveTo(cx,cy+r*1.12,cx-r*0.4,cy+r*0.6);
  ctx.quadraticCurveTo(cx-r*0.6,cy+r,cx-r,cy+r*0.5);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,140,170,0.55)';
  ctx.beginPath(); ctx.arc(cx-r*0.46,cy+r*0.16,r*0.16,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r*0.46,cy+r*0.16,r*0.16,0,7); ctx.fill();
  ctx.fillStyle='#1a2a1e'; ctx.strokeStyle='#1a2a1e'; ctx.lineCap='round';
  if(mood==='boom'){
    ctx.lineWidth=r*0.09;
    for(const sx of [-1,1]){ const ex=cx+sx*r*0.35, ey=cy-r*0.03, s=r*0.14;
      ctx.beginPath(); ctx.moveTo(ex-s,ey-s); ctx.lineTo(ex+s,ey+s); ctx.moveTo(ex+s,ey-s); ctx.lineTo(ex-s,ey+s); ctx.stroke(); }
  } else if(mood==='happy'){
    ctx.lineWidth=r*0.08;
    ctx.beginPath(); ctx.arc(cx-r*0.35,cy+r*0.03,r*0.16,Math.PI*1.12,Math.PI*1.88); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx+r*0.35,cy+r*0.03,r*0.16,Math.PI*1.12,Math.PI*1.88); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(cx-r*0.35,cy-r*0.02,r*0.12,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+r*0.35,cy-r*0.02,r*0.12,0,7); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(cx-r*0.31,cy-r*0.07,r*0.045,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+r*0.39,cy-r*0.07,r*0.045,0,7); ctx.fill();
  }
  ctx.strokeStyle='#1a2a1e'; ctx.lineWidth=r*0.06;
  ctx.beginPath();
  if(mood==='boom'){ ctx.arc(cx,cy+r*0.44,r*0.15,Math.PI,0); }
  else { ctx.moveTo(cx-r*0.1,cy+r*0.3); ctx.quadraticCurveTo(cx,cy+r*0.44,cx+r*0.1,cy+r*0.3); }
  ctx.stroke();
  ctx.restore();
}

function drawHUD(){
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#fff'; ctx.font='bold 30px system-ui,sans-serif';
  ctx.fillText(score, 200, 30);
  ctx.font='12px system-ui,sans-serif'; ctx.fillStyle='#9fa6d8';
  ctx.fillText('分數', 200, 52);
  // 最高分 / 關卡
  ctx.textAlign='left'; ctx.fillStyle='#ffd766'; ctx.font='bold 14px system-ui,sans-serif';
  ctx.fillText('👑 '+best, 12, 24);
  ctx.textAlign='right'; ctx.fillStyle='#8ef2b0';
  ctx.fillText('關卡 '+level, 388, 24);
  // 剩餘地雷數
  let flags=0; for(const c of cells) if(c.flag) flags++;
  const mineLeft=firstClick? bombs : (bombs-flags);
  ctx.textAlign='left'; ctx.fillStyle='#ff9a7a'; ctx.font='bold 15px system-ui,sans-serif';
  ctx.fillText('💣 '+mineLeft, 12, 46);
  // 拆彈倒數（第3關起）
  if(timed){
    const bw=150, bx=388-bw, by=40, bh=9;
    const ratio=firstClick?1:Math.max(0,timer/timeLimit);
    ctx.fillStyle='rgba(255,255,255,0.12)'; roundRect(bx,by,bw,bh,4); ctx.fill();
    ctx.fillStyle= ratio<0.25? '#ff4d4d' : '#ffcf5a'; roundRect(bx,by,bw*ratio,bh,4); ctx.fill();
    ctx.textAlign='right'; ctx.fillStyle='#cfd3ff'; ctx.font='11px system-ui,sans-serif';
    ctx.fillText('拆彈倒數 '+Math.ceil(firstClick?timeLimit:timer)+'s', 388, 58);
  }
  // 規則一句話
  ctx.textAlign='center'; ctx.fillStyle='#8b90c4'; ctx.font='12px system-ui,sans-serif';
  ctx.fillText('看行列數字＝該行列地雷數，避開炸毛格', 200, 132);
}

function drawBoard(){
  const L=layout, cell=L.cell;
  // 行/列數字線索（＝剩餘＝總數−已插旗）
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='bold '+Math.min(18,cell*0.42)+'px system-ui,sans-serif';
  if(!firstClick){
    for(let r=0;r<rows;r++){
      let fl=0; for(let c=0;c<cols;c++) if(cells[cellIdx(r,c)].flag) fl++;
      const rem=rowBombs[r]-fl;
      ctx.fillStyle= rem<0? '#ff5a5a' : rem===0? '#8ef2b0' : '#e7e9ff';
      ctx.fillText(rem, L.x0-L.gutter/2-1, L.y0+r*cell+cell/2);
    }
    for(let c=0;c<cols;c++){
      let fl=0; for(let r=0;r<rows;r++) if(cells[cellIdx(r,c)].flag) fl++;
      const rem=colBombs[c]-fl;
      ctx.fillStyle= rem<0? '#ff5a5a' : rem===0? '#8ef2b0' : '#e7e9ff';
      ctx.fillText(rem, L.x0+c*cell+cell/2, L.y0-L.gutter/2-1);
    }
  } else {
    ctx.fillStyle='#6b70a8'; ctx.font='12px system-ui,sans-serif';
    ctx.fillText('點任一格開始，第一格保證安全', L.x0+L.gw/2, L.y0-L.gutter/2);
  }
  // 格子
  const gap=Math.max(2, cell*0.06), rad=Math.max(4,cell*0.16);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const cel=cells[cellIdx(r,c)];
    const x=L.x0+c*cell+gap/2, y=L.y0+r*cell+gap/2, w=cell-gap, h=cell-gap;
    const cx=x+w/2, cy=y+h/2;
    if(cel.open && !cel.bomb){
      const g=ctx.createLinearGradient(x,y,x,y+h); g.addColorStop(0,'#5fce84'); g.addColorStop(1,'#3f9c63');
      ctx.fillStyle=g; roundRect(x,y,w,h,rad); ctx.fill();
      // 微史萊姆貓感：淡耳朵
      ctx.fillStyle='rgba(255,255,255,0.10)';
      ctx.beginPath(); ctx.arc(cx,cy+h*0.12,w*0.28,Math.PI,0); ctx.fill();
      if(cel.n>0){ ctx.fillStyle=NUMCOL[cel.n]; ctx.font='bold '+Math.floor(cell*0.5)+'px system-ui,sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(cel.n, cx, cy+1); }
    } else if(cel.bomb && (cel.open||state==='over')){
      ctx.fillStyle= cel.exploded? '#ff4133' : '#5a2740';
      roundRect(x,y,w,h,rad); ctx.fill();
      drawBombIcon(cx,cy,w*0.3);
    } else {
      // 未開格
      const g=ctx.createLinearGradient(x,y,x,y+h); g.addColorStop(0,'#4a4470'); g.addColorStop(1,'#332f52');
      ctx.fillStyle=g; roundRect(x,y,w,h,rad); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.07)'; roundRect(x+2,y+2,w-4,h*0.4,rad*0.7); ctx.fill();
      if(cel.flag){ drawFlagIcon(cx,cy,w*0.3); }
      else { ctx.fillStyle='rgba(255,255,255,0.10)'; ctx.font=Math.floor(cell*0.4)+'px system-ui,sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('?', cx, cy+1); }
    }
  }
  // 鍵盤游標
  if(showCursor && state==='play' && !winning){
    const x=L.x0+cursor.c*cell, y=L.y0+cursor.r*cell;
    ctx.strokeStyle='#ffd84d'; ctx.lineWidth=3; roundRect(x+1,y+1,cell-2,cell-2,rad); ctx.stroke();
  }
}
function drawBombIcon(cx,cy,r){
  ctx.fillStyle='#1a1420'; ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.fill();
  ctx.strokeStyle='#1a1420'; ctx.lineWidth=r*0.3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx+r*0.6,cy-r*0.6); ctx.lineTo(cx+r,cy-r*1.2); ctx.stroke();
  ctx.fillStyle='#ffb15a'; ctx.beginPath(); ctx.arc(cx+r,cy-r*1.2,r*0.28,0,7); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.arc(cx-r*0.3,cy-r*0.3,r*0.22,0,7); ctx.fill();
}
function drawFlagIcon(cx,cy,r){
  ctx.strokeStyle='#c9cdf0'; ctx.lineWidth=r*0.24; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx-r*0.5,cy-r*0.9); ctx.lineTo(cx-r*0.5,cy+r*0.9); ctx.stroke();
  ctx.fillStyle='#ff6b5a';
  ctx.beginPath(); ctx.moveTo(cx-r*0.5,cy-r*0.9); ctx.lineTo(cx+r*0.7,cy-r*0.4); ctx.lineTo(cx-r*0.5,cy+r*0.05); ctx.closePath(); ctx.fill();
}

function drawParticles(){
  for(const p of particles){ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,7); ctx.fill(); }
  ctx.globalAlpha=1;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  for(const p of popups){ const a=Math.max(0,p.life/p.max); ctx.globalAlpha=a;
    ctx.fillStyle=p.color; ctx.font='bold '+p.size+'px system-ui,sans-serif';
    ctx.fillText(p.t, p.x, p.y); }
  ctx.globalAlpha=1;
}

// 底部：模式切換鈕
function flagBtn(){ return {x:66,y:544,w:268,h:44}; }
function drawFlagButton(){
  if(state!=='play') return;
  const b=flagBtn();
  ctx.fillStyle= flagMode? 'rgba(255,120,90,0.28)':'rgba(120,220,150,0.22)';
  roundRect(b.x,b.y,b.w,b.h,14); ctx.fill();
  ctx.strokeStyle= flagMode? '#ff8f6b':'#7ee6a0'; ctx.lineWidth=2; roundRect(b.x,b.y,b.w,b.h,14); ctx.stroke();
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='bold 15px system-ui,sans-serif';
  ctx.fillStyle='#fff';
  ctx.fillText(flagMode? '🚩 目前：插旗模式（點切回挖格）':'⛏ 目前：挖格模式（點切插旗）', 200, b.y+b.h/2);
  ctx.fillStyle='#8b90c4'; ctx.font='11px system-ui,sans-serif';
  ctx.fillText('手機長按／電腦右鍵也能直接插旗', 200, 596);
}

function drawTitle(){
  drawSlimeCat(200,180,58,'happy');
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#fff'; ctx.font='bold 40px system-ui,sans-serif';
  ctx.fillText('喵格拆彈夜', 200, 300);
  ctx.fillStyle='#8ef2b0'; ctx.font='16px system-ui,sans-serif';
  ctx.fillText('看數字線索，避開炸毛地雷', 200, 336);
  // 規則卡
  ctx.fillStyle='rgba(255,255,255,0.08)'; roundRect(40,360,320,150,14); ctx.fill();
  ctx.textAlign='left'; ctx.fillStyle='#d7dbff'; ctx.font='13px system-ui,sans-serif';
  const lines=[
    '· 行/列旁的數字＝那一行/列的地雷數',
    '· 點格子＝挖開；挖到地雷就炸毛重來',
    '· 長按／右鍵／切模式＝插旗標記地雷',
    '· 挖光全部安全格 → 過關，難度往上爬',
    '· 第一格保證安全，放心開局'
  ];
  lines.forEach((t,i)=>ctx.fillText(t,58,388+i*24));
  // 開始提示
  const a=0.55+0.45*Math.sin(now01()*3);
  ctx.globalAlpha=a; ctx.textAlign='center'; ctx.fillStyle='#ffd84d'; ctx.font='bold 20px system-ui,sans-serif';
  ctx.fillText('點擊畫面開始拆彈', 200, 548); ctx.globalAlpha=1;
  ctx.fillStyle='#6b70a8'; ctx.font='12px system-ui,sans-serif';
  ctx.fillText('最高分 '+best, 200, 578);
}

function drawWinBanner(){
  const k=Math.min(1,(1.6-winAnim)/0.3);
  ctx.save(); ctx.globalAlpha=Math.min(1,winAnim*2);
  ctx.fillStyle='rgba(10,20,15,0.4)'; ctx.fillRect(0,140,400,400);
  drawSlimeCat(200,300,54*k,'happy');
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#ffe08a'; ctx.font='bold 30px system-ui,sans-serif';
  ctx.fillText('過關！', 200, 388);
  ctx.fillStyle='#8ef2b0'; ctx.font='16px system-ui,sans-serif';
  ctx.fillText('拆彈獎勵 +'+winBonus, 200, 420);
  ctx.restore();
}

function drawGameOver(){
  ctx.fillStyle='rgba(8,8,20,0.78)'; ctx.fillRect(0,0,400,600);
  drawSlimeCat(200,150,50,'boom');
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#ff6b5a'; ctx.font='bold 34px system-ui,sans-serif';
  ctx.fillText('炸毛啦！', 200, 236);
  ctx.fillStyle='#cfd3ff'; ctx.font='15px system-ui,sans-serif';
  ctx.fillText(overReason, 200, 268);
  ctx.fillStyle='#fff'; ctx.font='bold 24px system-ui,sans-serif';
  ctx.fillText('本局分數 '+score, 200, 316);
  // near-miss 再利用
  if(newRecord){
    const a=0.6+0.4*Math.sin(now01()*5);
    ctx.globalAlpha=a; ctx.fillStyle='#ffd84d'; ctx.font='bold 26px system-ui,sans-serif';
    ctx.fillText('🎉 新紀錄！', 200, 360); ctx.globalAlpha=1;
  } else {
    ctx.fillStyle='#8ef2b0'; ctx.font='17px system-ui,sans-serif';
    ctx.fillText('再 '+ (overDiff+1) +' 分就破紀錄！', 200, 356);
    ctx.fillStyle='#9fa6d8'; ctx.font='13px system-ui,sans-serif';
    ctx.fillText('目前最高 '+best, 200, 382);
  }
  ctx.fillStyle='#8b90c4'; ctx.font='13px system-ui,sans-serif';
  ctx.fillText('抵達第 '+level+' 關', 200, 412);
  // 重來鈕
  ctx.fillStyle='rgba(255,216,77,0.9)'; roundRect(110,450,180,52,16); ctx.fill();
  ctx.fillStyle='#231a00'; ctx.font='bold 20px system-ui,sans-serif';
  ctx.fillText('再拆一局', 200, 476);
  ctx.fillStyle='#6b70a8'; ctx.font='12px system-ui,sans-serif';
  ctx.fillText('點畫面任意處立即重來', 200, 520);
}

let now=0;
function draw(){
  ctx.clearRect(0,0,LOGICAL_W,LOGICAL_H);
  drawBackground();
  if(state==='title'){ drawTitle(); return; }
  drawHUD();
  ctx.save();
  if(shake>0.001){ ctx.translate((Math.random()-0.5)*shake*11,(Math.random()-0.5)*shake*11); }
  drawBoard();
  ctx.restore();
  drawParticles();
  drawFlagButton();
  if(flash>0){ ctx.fillStyle='rgba(255,70,60,'+(flash*0.4)+')'; ctx.fillRect(0,0,400,600); }
  if(winning) drawWinBanner();
  if(state==='over') drawGameOver();
}

// ====== 輸入 ======
function toLogical(e){
  const rect=canvas.getBoundingClientRect();
  return { x:(e.clientX-rect.left)/rect.width*LOGICAL_W, y:(e.clientY-rect.top)/rect.height*LOGICAL_H };
}
function cellAt(x,y){
  const L=layout;
  const c=Math.floor((x-L.x0)/L.cell), r=Math.floor((y-L.y0)/L.cell);
  if(!inRange(r,c)) return null;
  return {r:r,c:c};
}
function inBtn(x,y){ const b=flagBtn(); return x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h; }

let pd=null;
canvas.addEventListener('pointerdown',function(e){
  e.preventDefault(); initAudio();
  const p=toLogical(e);
  const hit=(state==='play'&&!winning)? cellAt(p.x,p.y):null;
  pd={x:p.x,y:p.y,cell:hit,moved:false,long:false,timer:null};
  if(hit && !firstClick){
    pd.timer=setTimeout(function(){ if(pd){ pd.long=true; toggleFlag(hit.r,hit.c); } },360);
  }
});
canvas.addEventListener('pointermove',function(e){
  if(!pd) return; const p=toLogical(e);
  if(Math.hypot(p.x-pd.x,p.y-pd.y)>10){ pd.moved=true; if(pd.timer){ clearTimeout(pd.timer); pd.timer=null; } }
});
canvas.addEventListener('pointerup',function(e){
  if(!pd) return; const p=toLogical(e);
  if(pd.timer){ clearTimeout(pd.timer); pd.timer=null; }
  const wasLong=pd.long, moved=pd.moved; pd=null;
  if(moved||wasLong) return;
  handleTap(p.x,p.y);
});
function clearPd(){ if(pd){ if(pd.timer) clearTimeout(pd.timer); pd=null; } }
canvas.addEventListener('pointercancel',clearPd);
window.addEventListener('blur',clearPd);
canvas.addEventListener('contextmenu',function(e){
  e.preventDefault(); initAudio();
  if(state==='play'&&!winning){ const p=toLogical(e); const h=cellAt(p.x,p.y); if(h) toggleFlag(h.r,h.c); }
});

function handleTap(x,y){
  if(state==='title'){ startRun(); return; }
  if(state==='over'){ startRun(); return; }
  if(winning) return;
  if(inBtn(x,y)){ flagMode=!flagMode; sFlag(); return; }
  const h=cellAt(x,y);
  if(!h) return;
  if(flagMode) toggleFlag(h.r,h.c);
  else revealCell(h.r,h.c);
}

// 鍵盤
window.addEventListener('keydown',function(e){
  initAudio();
  if(state==='title'||state==='over'){ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); startRun(); } return; }
  if(state!=='play'||winning) return;
  const k=e.key;
  if(k==='ArrowUp'){ cursor.r=Math.max(0,cursor.r-1); showCursor=true; e.preventDefault(); }
  else if(k==='ArrowDown'){ cursor.r=Math.min(rows-1,cursor.r+1); showCursor=true; e.preventDefault(); }
  else if(k==='ArrowLeft'){ cursor.c=Math.max(0,cursor.c-1); showCursor=true; e.preventDefault(); }
  else if(k==='ArrowRight'){ cursor.c=Math.min(cols-1,cursor.c+1); showCursor=true; e.preventDefault(); }
  else if(k==='Enter'||k===' '){ e.preventDefault(); showCursor=true; revealCell(cursor.r,cursor.c); }
  else if(k==='f'||k==='F'){ showCursor=true; toggleFlag(cursor.r,cursor.c); }
});

// ====== 啟動 ======
resize();
newBoard();            // 先備好版面，畫面停在標題
state='title';
requestAnimationFrame(frame);
})();
</script>
