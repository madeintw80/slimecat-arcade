<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>喵眼大搜查</title>
<style>
  /* 全站基本樣式：滿版深色底、置中畫布、禁止捲動 */
  html,body{margin:0;padding:0;height:100%;background:#0d1016;overflow:hidden;
    font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  /* canvas 觸控不捲頁 */
  canvas{touch-action:none;display:block;background:#000;
    box-shadow:0 10px 40px rgba(0,0,0,.6);border-radius:10px;}
  /* 左上角回大廳連結 */
  #lobby{position:fixed;top:8px;left:10px;z-index:10;color:#cfe;opacity:.8;
    font-size:13px;text-decoration:none;background:rgba(0,0,0,.35);
    padding:4px 9px;border-radius:12px;}
  #lobby:active{opacity:1;}
</style>

<body>
<a id="lobby" href="../../index.html">← 回遊戲區</a>
<div id="wrap"><canvas id="cv" width="400" height="600"></canvas></div>
<script>
"use strict";
(function(){
// ============ 基礎設定 ============
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const W=400,H=600;               // 邏輯尺寸（直式）
let scale=1,DPR=1;

// 依視窗等比縮放，並做高解析輸出
function resize(){
  const availW=Math.min(window.innerWidth, window.innerHeight*W/H);
  const availH=availW*H/W;
  DPR=Math.min(window.devicePixelRatio||1,3);
  cv.style.width=availW+'px';
  cv.style.height=availH+'px';
  cv.width=Math.round(availW*DPR);
  cv.height=Math.round(availH*DPR);
  scale=availW/W;
  // 邏輯座標維持 400x600
  ctx.setTransform(scale*DPR,0,0,scale*DPR,0,0);
}
window.addEventListener('resize',resize);
resize();

// 由螢幕座標換算回邏輯座標（用 rect 比例，不用 canvas.width）
function toLogic(clientX,clientY){
  const r=cv.getBoundingClientRect();
  return {x:(clientX-r.left)/r.width*W, y:(clientY-r.top)/r.height*H};
}

// ============ 音效（WebAudio 合成，零外部資源）============
let AC=null;
function ac(){
  if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){AC=null;} }
  if(AC&&AC.state==='suspended'){ try{AC.resume();}catch(e){} }
  return AC;
}
function tone(freq,dur,type,vol,slide,delay){
  const c=ac(); if(!c) return;
  const t0=c.currentTime+(delay||0);
  const o=c.createOscillator(), g=c.createGain();
  o.type=type||'sine';
  o.frequency.setValueAtTime(freq,t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(1,slide),t0+dur);
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.linearRampToValueAtTime(vol||0.2,t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g).connect(c.destination);
  o.start(t0); o.stop(t0+dur+0.03);
}
function sndFind(combo){                 // 找到貓：上升琶音，連段越高越亮
  const base=430*(1+Math.min(combo,12)*0.045);
  tone(base,0.12,'triangle',0.22,base*1.02,0);
  tone(base*1.26,0.12,'triangle',0.2,0,0.06);
  tone(base*1.5,0.16,'triangle',0.2,0,0.12);
}
function sndMiss(){ tone(150,0.12,'square',0.12,95,0); } // 點錯：低悶聲（零懲罰）
function sndClear(){ [523,659,784,1046].forEach((f,i)=>tone(f,0.16,'triangle',0.2,0,i*0.08)); }
function sndRecord(){ [784,988,1318,1568,2093].forEach((f,i)=>tone(f,0.18,'triangle',0.2,0,i*0.09)); }
function sndTick(){ tone(880,0.05,'square',0.09,0,0); }
function sndStart(){ tone(392,0.1,'sine',0.18,0,0); tone(587,0.14,'sine',0.18,0,0.08); }

// ============ 小工具 ============
function rnd(a,b){ return a+Math.random()*(b-a); }
function ri(a,b){ return Math.floor(rnd(a,b+1)); }
function lerp(a,b,t){ return a+(b-a)*t; }
function lerpRGB(a,b,t){ return [Math.round(lerp(a[0],b[0],t)),Math.round(lerp(a[1],b[1],t)),Math.round(lerp(a[2],b[2],t))]; }
function css(c,al){ return 'rgba('+c[0]+','+c[1]+','+c[2]+','+(al==null?1:al)+')'; }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }

// 圓角矩形路徑
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// ============ 主題（場景）配色 ============
const THEMES=[
  {name:'貓咪廚房', bg1:[240,228,204], bg2:[224,206,178], accent:[[214,120,90],[224,190,120],[150,180,160],[200,150,170],[180,160,120]]},
  {name:'午後客廳', bg1:[228,206,196], bg2:[206,182,172], accent:[[176,120,150],[210,170,110],[130,160,180],[200,140,120],[160,180,150]]},
  {name:'夜市攤位', bg1:[46,52,84],    bg2:[30,34,58],    accent:[[230,170,80],[220,110,120],[120,180,200],[180,150,220],[200,200,120]]},
  {name:'貓抓板森林',bg1:[196,214,180], bg2:[168,192,156], accent:[[120,160,110],[210,180,120],[180,140,110],[200,200,150],[150,170,200]]},
  {name:'貓砂浴室', bg1:[200,224,228], bg2:[176,204,212], accent:[[120,170,190],[210,180,200],[160,200,180],[200,200,160],[180,160,200]]}
];
const CAT_BASE=[96,205,120]; // 史萊姆貓原色（草綠）
const PLAYX0=36,PLAYX1=364,PLAYY0=134,PLAYY1=566; // 遊戲區範圍（HUD 下方）

// ============ 遊戲狀態 ============
let state='title';   // title / playing / over
let T=0;             // 全域時間累加（動畫用）
let level=1, score=0, best=0, combo=0, lastFind=-99;
let timeLeft=22, hintT=0, clearing=0, elapsed=0;
let theme=THEMES[0];
let cats=[], decoys=[];
let particles=[], floats=[];
let shake=0;
let firstHintFade=0;
let keyCur={x:200,y:350,active:false};
let keys={};
let lastRecord=false;

try{ best=parseInt(localStorage.getItem('miaoeye_best')||'0',10)||0; }catch(e){ best=0; }

// ============ 場景生成 ============
function newScene(lv){
  theme=THEMES[(lv-1)%THEMES.length];
  const breather=(lv%5===0);                     // 每 5 關給一個「反差喘息關」
  const catN=breather?Math.max(2,Math.min(2+Math.floor((lv-1)/2),7)-1)
                      :Math.min(2+Math.floor((lv-1)/2),7);
  const camo=breather?0.08:Math.min(0.18+(lv-1)*0.05,0.7);
  const catR=breather?30:rnd(20,24);
  const jitter=lv>=4?Math.min((lv-3)*0.7,4.5):0;  // 第3分鐘後的新壓力：雜物微微抖動
  const decoN=Math.min(10+lv*5,66);
  const pillowN=lv>=3?Math.min(lv-2,5):0;         // 近失誘餌：無耳無眼的史萊姆團

  cats=[]; decoys=[];
  const camoCol=lerpRGB(CAT_BASE,theme.bg1,camo);
  // 放貓（彼此保持距離）
  let tries=0;
  while(cats.length<catN && tries<600){
    tries++;
    const x=rnd(PLAYX0+catR,PLAYX1-catR), y=rnd(PLAYY0+catR,PLAYY1-catR);
    let ok=true;
    for(const c of cats){ if(Math.hypot(c.x-x,c.y-y)<catR*2.6){ok=false;break;} }
    if(ok) cats.push({x,y,r:catR*rnd(0.92,1.1),col:camoCol,phase:rnd(0,6.28),found:false,pop:0});
  }
  // 放雜物（含近失誘餌 pillow）
  const types=['yarn','can','fish','paw','star','bone','plant'];
  for(let i=0;i<decoN;i++){
    const isP=i<pillowN;
    const t=isP?'pillow':types[ri(0,types.length-1)];
    const r=isP?rnd(18,24):rnd(12,20);
    const x=rnd(PLAYX0+r,PLAYX1-r), y=rnd(PLAYY0+r,PLAYY1-r);
    const ac2=theme.accent[ri(0,theme.accent.length-1)];
    const col=isP?lerpRGB(CAT_BASE,theme.bg1,clamp(camo+0.05,0,0.75)):ac2;
    decoys.push({x,y,r,t,col,phase:rnd(0,6.28),jit:jitter});
  }
  hintT=0;
  if(lv===1) firstHintFade=4;
}

function startGame(){
  level=1;score=0;combo=0;lastFind=-99;timeLeft=22;clearing=0;elapsed=0;lastRecord=false;
  particles=[];floats=[];shake=0;
  newScene(1);
  state='playing';
  sndStart();
}

// ============ 互動 ============
function burst(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=rnd(0,6.28),s=rnd(40,180);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-40,life:rnd(0.4,0.8),ml:0.8,
      col:col,size:rnd(2,5)});
  }
}
function addFloat(x,y,text,col,size){ floats.push({x,y,text,col,size:size||20,life:0.9}); }

function findCat(c){
  c.found=true; c.pop=0.55;
  // 連段：3 秒內連續找到 → 倍率上升
  combo=(elapsed-lastFind<3.0)?combo+1:1;
  lastFind=elapsed;
  const mult=1+Math.min(combo-1,9)*0.5;
  const gain=Math.round(12*mult);
  score+=gain;
  const bonus=Math.max(1.3,4.2-level*0.18);      // 越後面每隻補的時間越少
  timeLeft+=bonus;
  burst(c.x,c.y,[255,240,140],22);
  burst(c.x,c.y,c.col,10);
  addFloat(c.x,c.y-c.r-6,'喵! +'+gain,[90,240,150],22);
  if(combo>=2) addFloat(c.x,c.y-c.r-30,'連段 x'+combo,[255,210,90],16);
  shake=Math.max(shake,3);
  hintT=0;
  sndFind(combo);
  if(cats.every(k=>k.found)){                    // 全找齊 → 過關慶祝
    clearing=0.75;
    score+=8; timeLeft+=1.5;
    sndClear();
    for(const k of cats){ burst(k.x,k.y,[255,255,180],14); }
    addFloat(200,300,'全部找到！',[255,235,120],28);
  }
}
function doTap(x,y){
  if(state==='title'){ startGame(); return; }
  if(state==='over'){ startGame(); return; }
  if(state!=='playing'||clearing>0) return;
  // 找最近的未發現貓
  let hit=null,hd=1e9;
  for(const c of cats){
    if(c.found) continue;
    const d=Math.hypot(c.x-x,c.y-y);
    if(d<c.r*1.25 && d<hd){ hd=d; hit=c; }
  }
  if(hit){ findCat(hit); }
  else{ // 點錯：零懲罰，只給塵土回饋
    burst(x,y,[210,210,210],6);
    addFloat(x,y-10,'？',[230,230,230],16);
    shake=Math.max(shake,4);
    sndMiss();
  }
}

// ---- 輸入：指標 ----
cv.addEventListener('pointerdown',e=>{
  e.preventDefault();
  ac();
  keyCur.active=false;
  const p=toLogic(e.clientX,e.clientY);
  doTap(p.x,p.y);
},{passive:false});
// 清掉可能殘留的輸入狀態
function clearInput(){ keys={}; }
window.addEventListener('pointercancel',clearInput);
window.addEventListener('blur',clearInput);

// ---- 輸入：鍵盤（方向鍵/WASD 移游標，空白/Enter 戳）----
window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(['arrowup','arrowdown','arrowleft','arrowright',' ','enter','w','a','s','d'].includes(k)) e.preventDefault();
  if(k===' '||k==='enter'){
    ac();
    if(state==='title'||state==='over'){ startGame(); return; }
    if(state==='playing'){ keyCur.active=true; doTap(keyCur.x,keyCur.y); return; }
  }
  keys[k]=true;
  if(['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d'].includes(k)){ keyCur.active=true; }
});
window.addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });

// ============ 更新 ============
function update(dt){
  T+=dt;
  // 粒子
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.life-=dt;
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=420*dt; p.vx*=0.96;
    if(p.life<=0) particles.splice(i,1);
  }
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i]; f.life-=dt; f.y-=34*dt;
    if(f.life<=0) floats.splice(i,1);
  }
  if(shake>0) shake=Math.max(0,shake-dt*24);
  if(firstHintFade>0) firstHintFade-=dt;

  if(state==='playing'){
    elapsed+=dt;
    // 鍵盤游標移動
    if(keyCur.active){
      const sp=260*dt;
      if(keys['arrowleft']||keys['a']) keyCur.x-=sp;
      if(keys['arrowright']||keys['d']) keyCur.x+=sp;
      if(keys['arrowup']||keys['w']) keyCur.y-=sp;
      if(keys['arrowdown']||keys['s']) keyCur.y+=sp;
      keyCur.x=clamp(keyCur.x,PLAYX0,PLAYX1);
      keyCur.y=clamp(keyCur.y,PLAYY0,PLAYY1);
    }
    for(const c of cats){ if(c.pop>0) c.pop=Math.max(0,c.pop-dt); }

    if(clearing>0){
      clearing-=dt;
      if(clearing<=0){ level++; newScene(level); }
    }else{
      // 時間持續流逝：難度隨關卡遞增（補時變少 + 偽裝變強）
      const prev=timeLeft;
      timeLeft-=dt;
      hintT+=dt;
      if(timeLeft<=5 && Math.floor(prev)!==Math.floor(timeLeft) && timeLeft>0) sndTick();
      if(timeLeft<=0){ timeLeft=0; gameOver(); }
    }
  }
}

function gameOver(){
  state='over';
  lastRecord=score>best;
  if(lastRecord){ best=score; try{localStorage.setItem('miaoeye_best',String(best));}catch(e){} sndRecord(); }
  else { tone(300,0.3,'sine',0.2,150,0); }
  if(window.SC) SC.over(score);   // 匿名數據回報
}

// ============ 繪圖：史萊姆貓 ============
function drawSlimeCat(cx,cy,r,col,phase,found,camoRim){
  const wob=Math.sin(T*3+phase)*0.05;
  const rw=r*(1+wob), rh=r*(1-wob);
  const dark=[Math.round(col[0]*0.82),Math.round(col[1]*0.82),Math.round(col[2]*0.82)];
  // 影子
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(cx,cy+rh*0.95,rw*0.85,rh*0.28,0,0,6.28); ctx.fill();
  // 耳朵
  ctx.fillStyle=css(dark);
  ctx.beginPath();
  ctx.moveTo(cx-rw*0.62,cy-rh*0.55); ctx.lineTo(cx-rw*0.28,cy-rh*1.35); ctx.lineTo(cx-rw*0.02,cy-rh*0.62); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx+rw*0.62,cy-rh*0.55); ctx.lineTo(cx+rw*0.28,cy-rh*1.35); ctx.lineTo(cx+rw*0.02,cy-rh*0.62); ctx.closePath(); ctx.fill();
  // 身體
  ctx.fillStyle=css(col);
  ctx.beginPath(); ctx.ellipse(cx,cy,rw,rh,0,0,6.28); ctx.fill();
  // 底部黏液滴
  [-0.55,0.05,0.6].forEach((o,i)=>{ ctx.beginPath(); ctx.ellipse(cx+o*rw, cy+rh*0.85, rw*0.16, rh*0.22,0,0,6.28); ctx.fill(); });
  // 描邊（高偽裝時提升可辨識度、維持公平）
  if(camoRim){ ctx.strokeStyle=css(lerpRGB(col,[255,255,255],0.22),0.5); ctx.lineWidth=2; ctx.beginPath(); ctx.ellipse(cx,cy,rw,rh,0,0,6.28); ctx.stroke(); }
  // 高光
  ctx.fillStyle='rgba(255,255,255,0.28)';
  ctx.beginPath(); ctx.ellipse(cx-rw*0.32,cy-rh*0.35,rw*0.26,rh*0.18,-0.5,0,6.28); ctx.fill();
  // 內耳
  ctx.fillStyle='rgba(255,170,190,0.9)';
  ctx.beginPath(); ctx.moveTo(cx-rw*0.44,cy-rh*0.62); ctx.lineTo(cx-rw*0.28,cy-rh*1.05); ctx.lineTo(cx-rw*0.14,cy-rh*0.66); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx+rw*0.44,cy-rh*0.62); ctx.lineTo(cx+rw*0.28,cy-rh*1.05); ctx.lineTo(cx+rw*0.14,cy-rh*0.66); ctx.closePath(); ctx.fill();
  // 眼睛（永遠深色，是「原來在這」的破綻）
  const ex=rw*0.36, ey=cy-rh*0.05, er=r*0.13;
  ctx.fillStyle='rgba(40,38,52,1)';
  ctx.beginPath(); ctx.ellipse(cx-ex,ey,er,er*1.25,0,0,6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+ex,ey,er,er*1.25,0,0,6.28); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(cx-ex+er*0.3,ey-er*0.4,er*0.35,0,6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+ex+er*0.3,ey-er*0.4,er*0.35,0,6.28); ctx.fill();
  // 嘴
  ctx.strokeStyle='rgba(50,45,60,0.7)'; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(cx,ey+er*1.3); ctx.quadraticCurveTo(cx-3,ey+er*2, cx-5,ey+er*1.7); ctx.moveTo(cx,ey+er*1.3); ctx.quadraticCurveTo(cx+3,ey+er*2, cx+5,ey+er*1.7); ctx.stroke();
  // 腮紅
  if(found){ ctx.fillStyle='rgba(255,150,170,0.5)'; ctx.beginPath(); ctx.arc(cx-rw*0.6,ey+er*1.4,er*0.7,0,6.28); ctx.fill(); ctx.beginPath(); ctx.arc(cx+rw*0.6,ey+er*1.4,er*0.7,0,6.28); ctx.fill(); }
}

// ============ 繪圖：雜物 ============
function drawDecoy(d){
  const jx=Math.sin(T*2.2+d.phase)*d.jit, jy=Math.cos(T*1.7+d.phase)*d.jit*0.6;
  const x=d.x+jx, y=d.y+jy, r=d.r, c=d.col;
  const dk=[Math.round(c[0]*0.7),Math.round(c[1]*0.7),Math.round(c[2]*0.7)];
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(x,y+r*0.9,r*0.8,r*0.24,0,0,6.28); ctx.fill();
  ctx.fillStyle=css(c);
  switch(d.t){
    case 'yarn':
      ctx.beginPath(); ctx.arc(x,y,r,0,6.28); ctx.fill();
      ctx.strokeStyle=css(dk,0.8); ctx.lineWidth=1.4;
      for(let i=-2;i<=2;i++){ ctx.beginPath(); ctx.arc(x,y,r,0.6+i*0.4,2.2+i*0.4); ctx.stroke(); }
      break;
    case 'can':
      rr(x-r*0.7,y-r,r*1.4,r*2,4); ctx.fill();
      ctx.fillStyle=css(dk); rr(x-r*0.7,y-r,r*1.4,r*0.4,3); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.35)'; rr(x-r*0.4,y-r*0.3,r*0.3,r*1.2,2); ctx.fill();
      break;
    case 'fish':
      ctx.strokeStyle=css(c); ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(x-r,y); ctx.lineTo(x+r*0.6,y); ctx.stroke();
      for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.moveTo(x+i*r*0.4,y-r*0.5); ctx.lineTo(x+i*r*0.4,y+r*0.5); ctx.stroke(); }
      ctx.beginPath(); ctx.arc(x+r*0.8,y,r*0.35,0,6.28); ctx.fill();
      break;
    case 'paw':
      ctx.beginPath(); ctx.ellipse(x,y+r*0.3,r*0.7,r*0.6,0,0,6.28); ctx.fill();
      for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.arc(x+i*r*0.5,y-r*0.5,r*0.28,0,6.28); ctx.fill(); }
      ctx.beginPath(); ctx.arc(x+r*0.75,y-r*0.1,r*0.24,0,6.28); ctx.fill();
      break;
    case 'star':
      ctx.beginPath();
      for(let i=0;i<10;i++){ const rr2=i%2?r*0.45:r; const a=-1.57+i*0.628; const px=x+Math.cos(a)*rr2, py=y+Math.sin(a)*rr2; i?ctx.lineTo(px,py):ctx.moveTo(px,py); }
      ctx.closePath(); ctx.fill();
      break;
    case 'bone':
      ctx.beginPath(); ctx.arc(x-r*0.7,y-r*0.4,r*0.4,0,6.28); ctx.arc(x-r*0.7,y+r*0.4,r*0.4,0,6.28); ctx.arc(x+r*0.7,y-r*0.4,r*0.4,0,6.28); ctx.arc(x+r*0.7,y+r*0.4,r*0.4,0,6.28); ctx.fill();
      rr(x-r*0.7,y-r*0.35,r*1.4,r*0.7,3); ctx.fill();
      break;
    case 'plant':
      ctx.fillStyle=css(dk); rr(x-r*0.5,y,r,r*0.9,3); ctx.fill();
      ctx.fillStyle=css(c);
      for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.ellipse(x+i*r*0.4,y-r*0.5,r*0.22,r*0.7,i*0.5,0,6.28); ctx.fill(); }
      break;
    case 'pillow': // 近失誘餌：像史萊姆貓的團塊，但沒有耳朵眼睛
      const rw=r*(1+Math.sin(T*2+d.phase)*0.04);
      ctx.beginPath(); ctx.ellipse(x,y,rw,r*0.96,0,0,6.28); ctx.fill();
      [-0.5,0.1,0.55].forEach(o=>{ ctx.beginPath(); ctx.ellipse(x+o*rw,y+r*0.85,rw*0.15,r*0.2,0,0,6.28); ctx.fill(); });
      ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.ellipse(x-rw*0.3,y-r*0.3,rw*0.25,r*0.16,-0.5,0,6.28); ctx.fill();
      break;
  }
}

// ============ 繪圖：HUD ============
function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fillRect(0,0,W,120);
  ctx.textBaseline='middle';
  // 關卡 + 主題
  ctx.fillStyle='#fff'; ctx.font='bold 18px sans-serif'; ctx.textAlign='left';
  ctx.fillText('第 '+level+' 關',14,22);
  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='13px sans-serif';
  ctx.fillText(theme.name,14,44);
  // 分數 / 最高
  ctx.textAlign='right'; ctx.fillStyle='#ffe27a'; ctx.font='bold 22px sans-serif';
  ctx.fillText(String(score),W-14,22);
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='12px sans-serif';
  ctx.fillText('最高 '+best,W-14,44);
  // 剩餘貓縮圖（蔡加尼克：一直看到還沒找到幾隻）
  const rem=cats.filter(c=>!c.found).length;
  ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.font='13px sans-serif';
  ctx.fillText('還剩',14,66);
  const n=Math.min(cats.length,8);
  for(let i=0;i<n;i++){
    const c=cats[i], ix=54+i*30, iy=66;
    ctx.save(); ctx.translate(ix,iy); ctx.scale(0.42,0.42);
    if(c.found){ ctx.globalAlpha=0.28; drawSlimeCat(0,0,20,[150,150,150],0,false,false); ctx.globalAlpha=1;
      ctx.restore(); ctx.strokeStyle='#7fff9f'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(ix-4,iy); ctx.lineTo(ix-1,iy+4); ctx.lineTo(ix+5,iy-5); ctx.stroke();
    } else { drawSlimeCat(0,0,20,CAT_BASE,i,false,false); ctx.restore(); }
  }
  // 時間條
  const barY=92, bw=W-28;
  ctx.fillStyle='rgba(255,255,255,0.18)'; rr(14,barY,bw,16,8); ctx.fill();
  const frac=clamp(timeLeft/22,0,1);
  const low=timeLeft<=5;
  const barCol=low?(Math.sin(T*14)>0?[255,90,90]:[255,150,90]):(frac<0.5?[255,190,80]:[120,230,140]);
  ctx.fillStyle=css(barCol); rr(14,barY,Math.max(0,bw*frac),16,8); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('時間 '+timeLeft.toFixed(1)+' 秒',W/2,barY+8);
}

// ============ 主繪圖 ============
function drawScene(){
  // 背景漸層
  const g=ctx.createLinearGradient(0,120,0,H);
  g.addColorStop(0,css(theme.bg1)); g.addColorStop(1,css(theme.bg2));
  ctx.fillStyle=g; ctx.fillRect(0,120,W,H-120);
  // 淡雜訊格線（增加「雜」的感覺）
  ctx.strokeStyle='rgba(0,0,0,0.05)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ ctx.beginPath(); ctx.moveTo(x,120); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=140;y<H;y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  ctx.save();
  if(shake>0){ ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake); }
  // 雜物
  for(const d of decoys) drawDecoy(d);
  // 貓
  const hintCat=(hintT>6)?cats.find(c=>!c.found):null;
  for(const c of cats){
    const pop=c.pop>0?1+Math.sin((0.55-c.pop)/0.55*Math.PI)*0.35:1;
    ctx.save(); ctx.translate(c.x,c.y); ctx.scale(pop,pop);
    if(c.found){ drawSlimeCat(0,0,c.r,CAT_BASE,c.phase,true,false); }
    else { drawSlimeCat(0,0,c.r,c.col,c.phase,false,true); }
    ctx.restore();
    // 卡關 6 秒自動提示：脈動光圈
    if(c===hintCat){ const a=0.35+0.35*Math.sin(T*6); ctx.strokeStyle='rgba(255,240,120,'+a+')'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(c.x,c.y,c.r*1.6,0,6.28); ctx.stroke(); }
  }
  // 粒子
  for(const p of particles){ ctx.globalAlpha=clamp(p.life/p.ml,0,1); ctx.fillStyle=css(p.col); ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,6.28); ctx.fill(); }
  ctx.globalAlpha=1;
  ctx.restore();

  // 浮動文字
  ctx.textAlign='center'; ctx.textBaseline='middle';
  for(const f of floats){ ctx.globalAlpha=clamp(f.life/0.9,0,1); ctx.fillStyle=css(f.col); ctx.font='bold '+f.size+'px sans-serif';
    ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=3; ctx.strokeText(f.text,f.x,f.y); ctx.fillText(f.text,f.x,f.y); }
  ctx.globalAlpha=1;

  // 鍵盤游標
  if(keyCur.active && state==='playing'){
    ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(keyCur.x,keyCur.y,14,0,6.28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(keyCur.x-20,keyCur.y); ctx.lineTo(keyCur.x-6,keyCur.y); ctx.moveTo(keyCur.x+6,keyCur.y); ctx.lineTo(keyCur.x+20,keyCur.y);
    ctx.moveTo(keyCur.x,keyCur.y-20); ctx.lineTo(keyCur.x,keyCur.y-6); ctx.moveTo(keyCur.x,keyCur.y+6); ctx.lineTo(keyCur.x,keyCur.y+20); ctx.stroke();
  }

  drawHUD();

  // 第一關新手提示（幾秒後淡出）
  if(firstHintFade>0 && level===1){
    ctx.globalAlpha=clamp(firstHintFade/4,0,1);
    ctx.fillStyle='rgba(0,0,0,0.5)'; rr(60,H-70,W-120,40,12); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='14px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('找有貓耳和眼睛的史萊姆貓，戳牠！',W/2,H-50);
    ctx.globalAlpha=1;
  }
}

// ============ 標題 / 結束畫面 ============
function drawTitle(){
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#20304a'); g.addColorStop(1,'#0f1622');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // 主角
  ctx.save(); ctx.translate(200,180); const b=Math.sin(T*2)*8; ctx.translate(0,b);
  drawSlimeCat(0,0,54,CAT_BASE,0,true,false); ctx.restore();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#fff'; ctx.font='bold 40px sans-serif';
  ctx.fillText('喵眼大搜查',W/2,300);
  ctx.fillStyle='#ffe27a'; ctx.font='16px sans-serif';
  ctx.fillText('在雜物堆裡戳出偽裝的史萊姆貓！',W/2,340);
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font='14px sans-serif';
  ctx.fillText('點畫面找齊全部貓咪即可過關',W/2,382);
  ctx.fillText('點錯不扣分，看時間條找越快分越高',W/2,406);
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='13px sans-serif';
  ctx.fillText('手機：直接點畫面 ／ 電腦：滑鼠點，或方向鍵+空白鍵',W/2,438);
  ctx.fillStyle='#ffe27a'; ctx.font='12px sans-serif';
  ctx.fillText('最高分 '+best,W/2,466);
  // 開始鈕
  const pulse=0.5+0.5*Math.sin(T*3);
  ctx.fillStyle='rgba(120,230,140,'+(0.6+0.4*pulse)+')'; rr(110,500,180,52,26); ctx.fill();
  ctx.fillStyle='#12331f'; ctx.font='bold 22px sans-serif';
  ctx.fillText('點擊開始',W/2,527);
}
function drawOver(){
  drawScene(); // 背景保留最後盤面
  ctx.fillStyle='rgba(10,14,22,0.78)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.save(); ctx.translate(200,150); const b=Math.sin(T*3)*6; ctx.translate(0,b);
  drawSlimeCat(0,0,44,CAT_BASE,0,true,false); ctx.restore();
  ctx.fillStyle='#ff8a6a'; ctx.font='bold 34px sans-serif';
  ctx.fillText('時間到！',W/2,250);
  ctx.fillStyle='#fff'; ctx.font='18px sans-serif';
  ctx.fillText('本局分數',W/2,300);
  ctx.fillStyle='#ffe27a'; ctx.font='bold 46px sans-serif';
  ctx.fillText(String(score),W/2,340);
  ctx.font='15px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.fillText('抵達第 '+level+' 關',W/2,378);
  // near-miss：差 X 分破紀錄 / 新紀錄
  if(lastRecord){
    const sp=0.5+0.5*Math.sin(T*6);
    ctx.fillStyle='rgba(255,230,110,'+(0.6+0.4*sp)+')'; ctx.font='bold 24px sans-serif';
    ctx.fillText('🏆 新紀錄！',W/2,418);
  }else{
    ctx.fillStyle='#8fd6ff'; ctx.font='16px sans-serif';
    ctx.fillText('差 '+(best-score+1)+' 分就破紀錄，再一局！',W/2,418);
  }
  const pulse=0.5+0.5*Math.sin(T*3);
  ctx.fillStyle='rgba(120,230,140,'+(0.6+0.4*pulse)+')'; rr(110,470,180,52,26); ctx.fill();
  ctx.fillStyle='#12331f'; ctx.font='bold 22px sans-serif';
  ctx.fillText('再玩一次',W/2,497);
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='12px sans-serif';
  ctx.fillText('點擊 或 空白鍵',W/2,540);
}

// ============ 主迴圈（deltaTime，不假設 60fps）============
let lastT=performance.now();
function frame(now){
  let dt=(now-lastT)/1000; lastT=now;
  if(dt>0.1) dt=0.1;                 // clamp，分頁切回不暴衝
  update(dt);
  ctx.clearRect(0,0,W,H);
  if(state==='title') drawTitle();
  else if(state==='playing') drawScene();
  else drawOver();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
