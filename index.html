<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SlimeCat 遊戲區 🐱🟢</title>
<style>
  :root{
    --bg:#0f1a0c; --card:#1b2c14; --line:#33511f;
    --acc:#7ce85a; --txt:#e8ffe0; --sub:#9fbf90;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 50% -100px,#1d3313,var(--bg));min-height:100vh;color:var(--txt);font-family:"Microsoft JhengHei",system-ui,sans-serif}
  header{text-align:center;padding:38px 16px 10px}
  h1{margin:0;font-size:clamp(26px,6vw,44px);letter-spacing:2px;color:var(--acc);text-shadow:0 0 18px rgba(124,232,90,.45)}
  .slogan{color:var(--sub);margin-top:8px;font-size:15px}
  .stats{margin-top:14px;font-size:13px;color:var(--sub)}
  .stats b{color:var(--acc)}
  main{max-width:980px;margin:22px auto 60px;padding:0 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
  a.card{position:relative;display:block;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;text-decoration:none;color:var(--txt);transition:transform .12s,box-shadow .12s,border-color .12s}
  a.card:hover{transform:translateY(-4px);border-color:var(--acc);box-shadow:0 10px 26px rgba(0,0,0,.45)}
  .emoji{font-size:44px;line-height:1}
  .thumb{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:10px;margin-top:10px;border:1px solid var(--line);display:block}
  .title{font-size:19px;font-weight:700;margin:10px 0 6px;color:#fff}
  .desc{font-size:13.5px;color:var(--sub);line-height:1.55;min-height:42px}
  .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;font-size:11.5px;color:var(--sub)}
  .chip{border:1px solid var(--line);border-radius:99px;padding:2px 9px;background:rgba(124,232,90,.07)}
  .chip.genre{color:var(--acc);border-color:rgba(124,232,90,.4)}
  .chip.rate{color:#ffd76a;border-color:rgba(255,215,106,.4)}
  .new{position:absolute;top:-9px;right:-6px;background:#ff9b3d;color:#2b1600;font-weight:800;font-size:11px;border-radius:99px;padding:3px 10px;box-shadow:0 3px 10px rgba(0,0,0,.4);transform:rotate(6deg)}
  .empty{grid-column:1/-1;text-align:center;color:var(--sub);padding:60px 0}
  footer{text-align:center;color:#5f7a54;font-size:12px;padding:26px 12px 40px;line-height:1.8}
  /* ── 評分＋留言彈窗 ── */
  .ratebtn{cursor:pointer;font-family:inherit;font-size:11.5px;color:#ffd76a;background:rgba(255,215,106,.07);border:1px solid rgba(255,215,106,.4);border-radius:99px;padding:2px 9px}
  .ratebtn:hover{background:rgba(255,215,106,.18)}
  #rateov{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
  #rateov.show{display:flex}
  #ratebox{background:var(--card);border:1px solid var(--acc);border-radius:16px;padding:22px;width:min(92vw,380px);box-shadow:0 18px 50px rgba(0,0,0,.5)}
  #ratebox h3{margin:0 0 14px;color:var(--acc);font-size:17px}
  #stars{display:flex;gap:5px;margin-bottom:12px}
  #stars button{flex:1;min-width:0;cursor:pointer;font-size:14px;padding:8px 0;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--sub);font-family:inherit}
  #stars button.on{background:rgba(255,215,106,.18);border-color:#ffd76a;color:#ffd76a;font-weight:700}
  #ratenote{width:100%;min-height:70px;background:#12210d;border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:10px;font-family:inherit;font-size:14px;resize:vertical}
  .ratebtns{display:flex;gap:10px;margin-top:14px}
  .ratebtns button{flex:1;cursor:pointer;padding:10px 0;border-radius:10px;font-family:inherit;font-size:15px;font-weight:700;border:1px solid var(--line);background:transparent;color:var(--sub)}
  .ratebtns .go{background:var(--acc);border-color:var(--acc);color:#10250a}
  #ratemsg{margin-top:10px;font-size:13px;color:var(--acc);min-height:18px;text-align:center}
  #ratefb{margin-top:14px;max-height:180px;overflow-y:auto}
  .fbtitle{font-size:12.5px;color:var(--sub);margin-bottom:8px}
  .fbitem{border-top:1px solid var(--line);padding:8px 2px}
  .fbnote{font-size:13px;color:var(--txt);line-height:1.5}
  .fbreply{font-size:12.5px;color:var(--acc);margin-top:4px;line-height:1.5}
  /* ── 🔧 剛更新徽章（比照 NEW!，換藍綠色好區隔）── */
  .upd{position:absolute;top:-9px;right:-6px;background:#3dd6c4;color:#062b26;font-weight:800;font-size:11px;border-radius:99px;padding:3px 10px;box-shadow:0 3px 10px rgba(0,0,0,.4);transform:rotate(6deg)}
  /* ── 頂部「更新日誌」入口按鈕 ── */
  .logbtn{margin-top:14px;cursor:pointer;font-family:inherit;font-size:13px;color:var(--acc);background:rgba(124,232,90,.08);border:1px solid rgba(124,232,90,.4);border-radius:99px;padding:6px 16px}
  .logbtn:hover{background:rgba(124,232,90,.2)}
  /* ── 更新日誌彈窗 ── */
  #logov{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
  #logov.show{display:flex}
  #logbox{background:var(--card);border:1px solid var(--acc);border-radius:16px;padding:22px;width:min(92vw,420px);box-shadow:0 18px 50px rgba(0,0,0,.5)}
  #logbox h3{margin:0 0 6px;color:var(--acc);font-size:17px}
  #logsub{color:var(--sub);font-size:12.5px;margin-bottom:12px}
  #loglist{max-height:56vh;overflow-y:auto}
  .logitem{border-top:1px solid var(--line);padding:10px 2px}
  .logitem:first-child{border-top:none}
  .logmeta{font-size:12.5px;color:var(--sub)}
  .logmeta b{color:#fff}
  .logsum{font-size:14px;color:var(--txt);line-height:1.5;margin-top:3px}
  .logempty{color:var(--sub);text-align:center;padding:30px 0;font-size:13.5px}
</style>
</head>
<body>
<header>
  <h1>🐱 SlimeCat 遊戲區 🟢</h1>
  <div class="slogan">不斷生產新遊戲的小遊戲樂園 — 工廠每天爬排行榜、提煉玩法、自動生一款</div>
  <div class="stats" id="stats"></div>
  <button id="logbtn" class="logbtn">📢 更新日誌</button>
</header>
<main id="list"></main>
<footer>🏭 SlimeCat 遊戲工廠自動生產 · Batnini 出品<br>致敬千禧年的網頁小遊戲樂園</footer>
<!-- 更新日誌彈窗（工廠修過的遊戲都會列在這，玩家看得到改了什麼） -->
<div id="logov">
  <div id="logbox">
    <h3>📢 更新日誌</h3>
    <div id="logsub">工廠會持續修好玩家回報的問題，這裡看得到每款改了什麼</div>
    <div id="loglist"></div>
    <div class="ratebtns"><button id="logclose">關閉</button></div>
  </div>
</div>
<!-- 評分＋留言彈窗（匿名，回饋會餵給遊戲工廠改進下一款） -->
<div id="rateov">
  <div id="ratebox">
    <h3 id="ratetitle">⭐ 評分</h3>
    <div id="stars"></div>
    <textarea id="ratenote" maxlength="200" placeholder="留言給工廠（選填，200 字內）：哪裡好玩？哪裡卡？"></textarea>
    <div class="ratebtns">
      <button id="ratecancel">取消</button>
      <button class="go" id="ratesend">送出</button>
    </div>
    <div id="ratemsg"></div>
    <div id="ratefb"></div>
  </div>
</div>
<script src="sc_config.js"></script>
<script src="stats.js"></script>
<script src="games.js?v=c6ffa53c"></script>
<script>
// 讀 games.js 的 GAMES 清單，畫出遊戲卡片（新的排前面）
const list = document.getElementById("list");
const stats = document.getElementById("stats");
const games = (typeof GAMES !== "undefined" ? GAMES.slice() : [])
  .sort((a, b) => (b.date + b.id).localeCompare(a.date + a.id));

// 今天日期字串，用來標 NEW!
const today = new Date();
const todayStr = today.getFullYear() + "-" +
  String(today.getMonth() + 1).padStart(2, "0") + "-" +
  String(today.getDate()).padStart(2, "0");

stats.innerHTML = games.length
  ? `目前共 <b>${games.length}</b> 款 · 最新出廠 <b>${games[0].date}</b>`
  : "";

if (!games.length) {
  list.innerHTML = '<div class="empty">🏭 工廠正在準備第一款遊戲…</div>';
}
for (const g of games) {
  const a = document.createElement("a");
  a.className = "card";
  // 遊戲連結帶「更新日」版本參數 → 修過的遊戲網址就變、瀏覽器強制載新版（防快取玩到舊版）
  a.href = "games/" + g.id + "/index.html" + (g.updated_at ? "?v=" + g.updated_at : "");
  const plays = getPlays(g.id);
  a.innerHTML =
    // 今天出廠 → NEW!；否則最近 7 天內修過 → 🔧 剛更新（兩者互斥，新遊戲優先標 NEW）
    (g.date === todayStr
      ? '<span class="new">NEW!</span>'
      : (g.updated_at && daysAgo(g.updated_at) <= 7 ? '<span class="upd">🔧 剛更新</span>' : "")) +
    `<div class="emoji">${g.emoji || "🎮"}</div>` +
    `<img class="thumb" src="games/${g.id}/shot.png" loading="lazy" alt="" onerror="this.remove()">` +
    `<div class="title">${esc(g.title)}</div>` +
    `<div class="desc">${esc(g.desc || "")}</div>` +
    `<div class="meta">` +
      `<span class="chip genre">${esc(g.genre || "小遊戲")}</span>` +
      `<span class="chip">${g.date}</span>` +
      (g.user_rating ? `<span class="chip rate">👤 ${g.user_rating}/10</span>` : "") +
      (g.ai_score ? `<span class="chip rate">🤖 ${g.ai_score}/50</span>` : "") +
      (plays ? `<span class="chip">玩過 ${plays} 次</span>` : "") +
      (getMyRate(g.id) ? `<span class="chip rate">⭐ 我評 ${getMyRate(g.id)}</span>` : "") +
      `<button class="ratebtn" data-gid="${g.id}" data-gtitle="${esc(g.title)}">⭐ 評分</button>` +
    `</div>`;
  a.addEventListener("click", (e) => {
    const rb = e.target.closest(".ratebtn");
    if (rb) { e.preventDefault(); openRate(rb.dataset.gid, rb.dataset.gtitle); return; } // 點評分不開遊戲
    addPlay(g.id); // 本機版「點擊率」：記每款開了幾次
  });
  list.appendChild(a);
}

// 遊玩次數存 localStorage（之後上線再換成真的分析數據）
function getPlays(id) {
  try { return +(localStorage.getItem("plays_" + id) || 0); } catch (e) { return 0; }
}
function addPlay(id) {
  try { localStorage.setItem("plays_" + id, getPlays(id) + 1); } catch (e) {}
}

// 防 XSS 的簡單跳脫（遊戲資料是自家工廠產的，防個保險）
function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// ─── 玩家評分＋留言（匿名，跟遙測走同一條 GAS 管線；工廠會讀來改進下一款）───
const rateov = document.getElementById("rateov");
let rateGid = null, rateVal = 0;

function getMyRate(id) { try { return +(localStorage.getItem("sc_myrate_" + id) || 0); } catch (e) { return 0; } }

function openRate(gid, title) {
  rateGid = gid;
  rateVal = getMyRate(gid) || 0;   // 評過的預選舊分數，可改評
  document.getElementById("ratetitle").textContent = "⭐ 評分《" + title + "》";
  document.getElementById("ratenote").value = "";
  document.getElementById("ratemsg").textContent = "";
  // 最近回饋＋工廠回覆（工廠每天讀留言：能改的直接改款、回覆「已更新」）
  const fb = ((games.find(x => x.id === gid) || {}).feedback || []).slice().reverse();
  document.getElementById("ratefb").innerHTML = fb.length
    ? '<div class="fbtitle">💬 最近回饋（工廠每天讀，改完會回覆）</div>' + fb.map(f =>
        `<div class="fbitem"><div class="fbnote">「${esc(f.note)}」</div>` +
        `<div class="fbreply">🏭 ${esc(f.reply)}</div></div>`).join("")
    : "";
  drawStars();
  rateov.classList.add("show");
}
function drawStars() {
  const box = document.getElementById("stars");
  box.innerHTML = "";
  for (let i = 1; i <= 10; i++) {
    const b = document.createElement("button");
    b.textContent = i;
    if (i <= rateVal) b.classList.add("on");
    b.addEventListener("click", () => { rateVal = i; drawStars(); });
    box.appendChild(b);
  }
}
document.getElementById("ratecancel").addEventListener("click", () => rateov.classList.remove("show"));
rateov.addEventListener("click", (e) => { if (e.target === rateov) rateov.classList.remove("show"); });

document.getElementById("ratesend").addEventListener("click", () => {
  const msg = document.getElementById("ratemsg");
  if (!rateVal) { msg.textContent = "先點一個分數（1～10）再送出"; return; }
  const url = window.SC_ANALYTICS_URL || "";
  if (url) {
    let did = "anon";
    try { did = localStorage.getItem("sc_did") || "anon"; } catch (e) {}
    try {
      navigator.sendBeacon(url, JSON.stringify({
        ev: "rate", game: rateGid, val: rateVal,
        note: document.getElementById("ratenote").value.slice(0, 200),
        did, days: 0,
        mob: /Mobi|Android/i.test(navigator.userAgent) ? 1 : 0,
      }));
    } catch (e) {}
  }
  try { localStorage.setItem("sc_myrate_" + rateGid, rateVal); } catch (e) {}
  msg.textContent = "✅ 已送出，謝謝回饋！工廠會參考";
  setTimeout(() => rateov.classList.remove("show"), 900);
});

// ─── 更新日誌：算某天距今幾天（給「🔧 剛更新」徽章判斷用）───
function daysAgo(dateStr) {
  if (!dateStr) return Infinity;
  const d = new Date(dateStr + "T00:00:00");
  return Math.floor((today - d) / 86400000);
}

// ─── 更新日誌彈窗：把所有遊戲的 changelog 攤平、依日期新到舊列出 ───
const logov = document.getElementById("logov");
document.getElementById("logbtn").addEventListener("click", () => {
  const rows = [];
  for (const g of games) {
    for (const c of (g.changelog || [])) {
      rows.push({ emoji: g.emoji || "🎮", title: g.title, date: c.date, summary: c.summary });
    }
  }
  rows.sort((a, b) => b.date.localeCompare(a.date)); // 日期新的排前面
  document.getElementById("loglist").innerHTML = rows.length
    ? rows.map(r =>
        `<div class="logitem"><div class="logmeta">${r.emoji} <b>${esc(r.title)}</b> · ${r.date}</div>` +
        `<div class="logsum">${esc(r.summary)}</div></div>`).join("")
    : '<div class="logempty">還沒有更新記錄，工廠會持續修好玩家回報的問題喵～</div>';
  logov.classList.add("show");
});
document.getElementById("logclose").addEventListener("click", () => logov.classList.remove("show"));
logov.addEventListener("click", (e) => { if (e.target === logov) logov.classList.remove("show"); });
</script>
</body>
</html>
